<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KERS Regie</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: radial-gradient(circle at 30% -10%, #1d2433, #0a0c11 70%);
         color: #fff; padding: 14px; min-height: 100vh; }
  h1 { font-size: 20px; letter-spacing: 1px; }
  .sub { color: #8e8e9e; font-size: 12px; margin: 2px 0 14px; }
  .wrap { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  .col-tower { flex: 1 1 300px; min-width: 280px; max-width: 430px; }
  .col-ctl { flex: 1 1 300px; min-width: 260px; }
  .card { background: rgba(16,16,22,0.85); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden; margin-bottom: 14px; }
  .card h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #9aa0aa; padding: 9px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .trow { display: flex; align-items: center; gap: 8px; height: 30px; padding: 0 10px; border-left: 3px solid var(--t,#fff); font-size: 13px; }
  .trow + .trow { box-shadow: inset 0 1px 0 rgba(255,255,255,0.04); }
  .trow .tp { font-family: monospace; width: 22px; color: #9aa0aa; text-align: right; }
  .trow .tl { width: 18px; height: 18px; object-fit: contain; flex-shrink: 0; }
  .trow .tn { flex: 1; font-weight: 600; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .trow .ty { font-family: monospace; font-size: 11px; font-weight: 700; min-width: 30px; text-align: center; }
  .trow .tg { font-variant-numeric: tabular-nums; color: #ffcc00; font-size: 12px; min-width: 52px; text-align: right; }
  .btns { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px; }
  button { flex: 1; min-width: 120px; padding: 16px 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12);
           background: rgba(255,255,255,0.05); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .12s, border-color .12s, box-shadow .12s, transform .05s; }
  button.on { background: #e10600; border-color: #e10600; box-shadow: 0 0 16px rgba(225,6,0,0.4); }
  button:active { transform: scale(0.97); }
  .off-btn { min-width: 100%; background: rgba(255,255,255,0.03); color: #9aa0aa; }
  .brow { display: flex; align-items: center; gap: 8px; padding: 7px 12px; font-size: 13px; }
  .brow + .brow { box-shadow: inset 0 1px 0 rgba(255,255,255,0.04); }
  .brow .bp { font-family:monospace; color: #9aa0aa; }
  .brow .bg { margin-left: auto; font-variant-numeric: tabular-nums; color: #ffcc00; }
  .empty { padding: 10px 12px; color: #8e8e9e; font-size: 12px; }
  .status { font-size: 11px; margin-top: 8px; } .status.ok { color: #00e676; } .status.err { color: #ff5a5a; }
  #qtimes { padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
  .qrow { display: flex; align-items: center; gap: 8px; }
  .qrow .qp { font-family: monospace; color: #9aa0aa; width: 24px; }
  .qrow input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; color: #fff; padding: 8px; font-size: 13px; }
  .qrow .qn { flex: 1; min-width: 0; }
  .qrow .qt { width: 96px; font-family: monospace; }
</style>
</head>
<body>
<h1>KERS Regie</h1>
<div class="sub">Live-Tower links, Steuerung rechts. Läuft übers Netz — auch vom Handy.</div>

<div class="wrap">
  <div class="col-tower">
    <div class="card"><h2 id="towerHead">Leaderboard</h2><div id="tower"><div class="empty">warte auf Daten…</div></div></div>
  </div>
  <div class="col-ctl">
    <div class="card"><h2>Verlaufs-Charts (nur eins gleichzeitig)</h2>
      <div class="btns">
        <button data-chart="pos">Positionen</button>
        <button data-chart="gap">Gap</button>
        <button data-chart="lap">Rundenzeiten</button>
      </div>
    </div>
    <div class="card"><h2>Panels</h2>
      <div class="btns">
        <button data-toggle="h2h">Head-to-Head</button>
        <button data-toggle="champ">WM-Stand</button>
        <button class="off-btn" id="allOff">Alles ausblenden</button>
      </div>
    </div>
    <div class="card"><h2 id="bhHead">Battles</h2><div id="battles"><div class="empty">—</div></div></div>
    <div class="card"><h2>WM-Stand (Live-Projektion)</h2><div id="champ"><div class="empty">—</div></div></div>
    <div class="card"><h2>Top 3 Quali (manuell · nur Merkzettel)</h2>
      <div id="qtimes">
        <div class="qrow"><span class="qp">P1</span><input class="qn" data-i="0" placeholder="Fahrer"><input class="qt" data-i="0" placeholder="1:29.412"></div>
        <div class="qrow"><span class="qp">P2</span><input class="qn" data-i="1" placeholder="Fahrer"><input class="qt" data-i="1" placeholder="Zeit"></div>
        <div class="qrow"><span class="qp">P3</span><input class="qn" data-i="2" placeholder="Fahrer"><input class="qt" data-i="2" placeholder="Zeit"></div>
      </div>
    </div>
  </div>
</div>
<div class="status" id="status">verbinde…</div>

<script>
const TEAM_COLORS = { "Red Bull":"#3671C6","McLaren":"#FF8000","Ferrari":"#E80020","Mercedes":"#27F4D2",
  "Aston Martin":"#229971","Haas":"#B6BABD","RB":"#6692FF","Alpine":"#0093CC","Williams":"#64C4FF",
  "Audi":"#C8102E","Cadillac":"#C9A227","Sauber":"#52E252" };
const TEAM_LOGOS = { "Red Bull":"Red_Bull_Half","Ferrari":"Ferrari","McLaren":"McLaren","Mercedes":"Mercedes",
  "Aston Martin":"Aston_Martin","Haas":"Haas","RB":"Racing_Bull","Alpine":"Alpine","Williams":"Williams",
  "Sauber":"Audi","Audi":"Audi","Cadillac":"Cadillac" };
const TYRE_COLOR = { S:"#E8002D", M:"#FFC906", H:"#EBEBEB", I:"#39B54A", W:"#0067FF", E:"#00CFFF" };
const logoSrc = t => TEAM_LOGOS[t] ? "/static/" + TEAM_LOGOS[t] + ".png" : "";
const esc = s => (s || "").replace(/</g, "&lt;");
let S = { chart: "none", h2h: false, champ: false };
function setStatus(t, c) { const el = document.getElementById("status"); el.textContent = t; el.className = "status " + (c || ""); }
function renderBtns() {
  document.querySelectorAll("button[data-chart]").forEach(b => b.classList.toggle("on", S.chart === b.dataset.chart));
  document.querySelectorAll("button[data-toggle]").forEach(b => b.classList.toggle("on", !!S[b.dataset.toggle]));
}
async function pullRegie() { try { S = await (await fetch("/api/regie")).json(); renderBtns(); } catch (e) {} }
async function push(patch) {
  try { S = await (await fetch("/api/regie", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(patch) })).json(); renderBtns(); }
  catch (e) { setStatus("Senden fehlgeschlagen", "err"); }
}
async function pullLive() {
  let d;
  try { d = await (await fetch("/api/live")).json(); setStatus(d.connected ? "verbunden" : "kein Spiel-Signal", d.connected ? "ok" : "err"); }
  catch (e) { setStatus("keine Verbindung zum Overlay-Server", "err"); return; }
  const drivers = (d.drivers || []).slice().sort((a, b) => a.position - b.position);
  const quali = !!(d.session && d.session.is_quali);
  document.getElementById("towerHead").textContent = quali ? "Quali" : "Rennen";
  document.getElementById("tower").innerHTML = drivers.length ? drivers.map(dr =>
      `<div class="trow" style="--t:${TEAM_COLORS[dr.team] || "#888"}"><span class="tp">${dr.position}</span>`
    + (logoSrc(dr.team) ? `<img class="tl" src="${logoSrc(dr.team)}" alt="" onerror="this.style.visibility='hidden'">` : `<span class="tl"></span>`)
    + `<span class="tn">${esc(dr.name)}</span>`
    + `<span class="ty" style="color:${TYRE_COLOR[dr.compound] || "#888"}">${dr.compound || ""}${(dr.tyre_age >= 0 && dr.compound) ? " " + dr.tyre_age : ""}</span>`
    + `<span class="tg">${dr.dnf ? "DNF" : quali ? (dr.best_lap > 0 ? dr.best_lap.toFixed(3) : "—") : (dr.gap_to_leader > 0 ? "+" + dr.gap_to_leader.toFixed(1) : "LEADER")}</span></div>`).join("")
    : `<div class="empty">keine Fahrer</div>`;
  const bh = document.getElementById("battles"), head = document.getElementById("bhHead");
  if (quali) {
    head.textContent = "Hotlap (fliegende Runde)";
    const hot = drivers.filter(dr => !dr.in_pit && !dr.dnf && (dr.driver_status === 1 || dr.driver_status === 4))
                       .sort((a, b) => (b.lap_distance || 0) - (a.lap_distance || 0)).slice(0, 6);
    bh.innerHTML = hot.length ? hot.map(dr => `<div class="brow"><span class="bp">P${dr.position}</span><span>${esc(dr.name)}</span></div>`).join("")
      : `<div class="empty">niemand auf einer fliegenden Runde</div>`;
  } else {
    head.textContent = "Battles";
    const pairs = [];
    for (let i = 1; i < drivers.length; i++) {
      const a = drivers[i];
      if (!a.in_pit && !a.dnf && a.gap_to_ahead > 0 && a.gap_to_ahead < 1.5)
        pairs.push({ p: drivers[i - 1].position, a: drivers[i - 1].name, b: a.name, g: a.gap_to_ahead });
    }
    bh.innerHTML = pairs.length ? pairs.slice(0, 6).map(p =>
        `<div class="brow"><span class="bp">P${p.p}</span><span>${esc(p.a)} vs ${esc(p.b)}</span><span class="bg">${p.g.toFixed(1)}s</span></div>`).join("")
      : `<div class="empty">gerade keine engen Kämpfe</div>`;
  }
}
document.addEventListener("click", e => {
  const c = e.target.closest("button[data-chart]"); if (c) { push({ chart: S.chart === c.dataset.chart ? "none" : c.dataset.chart }); return; }
  const t = e.target.closest("button[data-toggle]"); if (t) { push({ [t.dataset.toggle]: !S[t.dataset.toggle] }); return; }
  if (e.target.id === "allOff") push({ chart: "none", h2h: false, champ: false });
});
async function pollChamp() {
  let c;
  try { c = await (await fetch("/api/championship")).json(); } catch (e) { return; }
  const el = document.getElementById("champ");
  const st = (c && c.standings) || [];
  el.innerHTML = st.length ? st.slice(0, 12).map((s, i) =>
      `<div class="brow"><span class="bp">${i + 1}</span><span>${esc(s.name)}</span>`
    + `<span class="bg">${s.total_points}${s.live_points > 0 ? " (+" + s.live_points + ")" : ""}</span></div>`).join("")
    : `<div class="empty">keine WM-Daten (championship.json prüfen)</div>`;
}
// Top-3-Quali-Merkzettel: nur lokal (localStorage), bleibt beim Neuladen erhalten.
function loadQ() {
  let q = {}; try { q = JSON.parse(localStorage.getItem("kers_qtimes") || "{}"); } catch (e) {}
  document.querySelectorAll("#qtimes .qn").forEach(i => i.value = q["n" + i.dataset.i] || "");
  document.querySelectorAll("#qtimes .qt").forEach(i => i.value = q["t" + i.dataset.i] || "");
}
document.getElementById("qtimes").addEventListener("input", () => {
  const q = {};
  document.querySelectorAll("#qtimes .qn").forEach(i => q["n" + i.dataset.i] = i.value);
  document.querySelectorAll("#qtimes .qt").forEach(i => q["t" + i.dataset.i] = i.value);
  localStorage.setItem("kers_qtimes", JSON.stringify(q));
});
loadQ();
pullRegie(); pullLive(); pollChamp();
setInterval(pullRegie, 1500);
setInterval(pullLive, 700);
setInterval(pollChamp, 2500);
</script>
</body>
</html>
