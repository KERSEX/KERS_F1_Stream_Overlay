function colorSectors(row, idx, secs) {
  const cls = ["s1", "s2", "s3"];
  const pb = drvSecBest[idx] || (drvSecBest[idx] = [Infinity, Infinity, Infinity]);
  secs.forEach((v, i) => {
    const span = row.querySelector("." + cls[i]);
    span.classList.remove("sp", "sg", "sy");
    if (!(v > 0)) return;
    if (v <= secBest[i] + 0.005) span.classList.add("sp");        // Session-Best
    else if (v <= pb[i] + 0.005) span.classList.add("sg");        // persönlich
    else span.classList.add("sy");                                // langsamer
    if (v < secBest[i]) secBest[i] = v;
    if (v < pb[i]) pb[i] = v;
  });
}
function clearSectorColors(row) { row.querySelectorAll(".col-sectors span").forEach(s => s.classList.remove("sp", "sg", "sy")); }
// Box/Outlap/INLAP: die 3 Sektoren der SCHNELLSTEN RUNDE des Fahrers anzeigen
// (eine echte, zusammenhängende Runde — nicht zusammengesetzte Bestsektoren).
// Fallback auf Bestsektoren, solange noch keine komplette Bestrunde erfasst ist.
// Lila = Session-Best, sonst grün.
function showBestSectors(row, idx) {
  const cls = ["s1", "s2", "s3"];
  const src = bestLapSecs[idx] || drvSecBest[idx] || [Infinity, Infinity, Infinity];
  src.forEach((v, i) => {
    const span = row.querySelector("." + cls[i]);
    span.classList.remove("sp", "sg", "sy");
    if (!(v > 0 && v < Infinity)) { span.textContent = "—"; return; }
    span.textContent = fmtTime(v);
    span.classList.add(v <= secBest[i] + 0.005 ? "sp" : "sg");
  });
}

// Quali-Status eines Fahrers: box / out(lap) / inlap / track(=Hotlap).
// STABIL gehalten (kein Flackern -> Fahrer/Delta bleiben in der Hotlap-Box):
//   (1) Ungültige Runde (Track Limits) -> NIE Hotlap.
//   (2) Klar zu langsam (verbummelte/abgebrochene Runde) -> inlap, raus aus den Boxen.
//   (3) Nachweislich auf Bestpace (fertiger Sektor nahe Bestsektor) -> Hotlap.
//   (4) Frischer Rundenstart (S1 noch nicht gepostet, kein Beweis): fliegende Runde laut
//       Spiel (ds=1) ODER aktives ERS-Deploy (Modus Hotlap/Overtake) ODER >=40 % ERS -> er
//       greift an -> Hotlap. Nur wer wenig ERS hat UND nicht deployt UND keine fliegende
//       Runde meldet -> "out" (sammelt ERS / cruist). ers_mode ist stabil ab S/Z -> S1 flackert nicht mehr.
function qualiStatus(d) {
  const ds = d.driver_status;
  let st = d.in_pit ? "box" : ds === 3 ? "out" : ds === 2 ? "inlap"
         : (ds === 1 || ds === 4) ? "track" : "box";
  if (st !== "track") return st;

  // (1) Ungültige Runde ist nie ein Hotlap.
  if (d.lap_invalid) return "inlap";

  const pb  = drvSecBest[d.index];
  const clt = d.current_lap_time || 0;
  const TOL = 1.4;   // Pace-Toleranz (etwas großzügiger -> weniger Fehl-Abbrüche/Flackern)

  let tooSlow = false;   // klar langsamer als die Bestpace -> Runde hin
  let onPace  = false;   // fertiger Sektor nahe der Bestpace -> bewiesen schnell
  if (pb) {
    // Fertige Sektoren dieser Runde gegen die persönlichen Bestsektoren.
    const s3 = (d.last_lap > 0 && d.sector1 > 0 && d.sector2 > 0) ? d.last_lap - d.sector1 - d.sector2 : 0;
    let ab = 0, have = false;
    [d.sector1, d.sector2, s3].forEach((v, i) => { if (v > 0 && pb[i] < Infinity) { ab += v - pb[i]; have = true; } });
    if (have) { if (ab > TOL) tooSlow = true; else onPace = true; }
    // LIVE, schon MITTEN im Sektor über der Bestpace bis zum Sektorende -> Runde hin.
    if (clt > 0.5) {
      let cum = 0, ok = true;
      for (let i = 0; i <= Math.min(d.sector || 0, 2); i++) { if (pb[i] < Infinity) cum += pb[i]; else ok = false; }
      if (ok && clt > cum + TOL) tooSlow = true;
    }
  }

  if (tooSlow) return "inlap";                         // (2) klar zu langsam
  if (onPace)  return "track";                         // (3) bewiesen schnell
  // (4) Frischer Start ohne Sektor-Beweis: fliegende Runde / am Deployen / genug ERS -> Hotlap.
  if (ds === 1 || (d.ers_mode || 0) >= 2 || (d.ers_pct || 0) >= 40) return "track";
  return "out";
}

const pitTyreImg = (c, cls = "") => TYRE_ICONS[c] ? `<img class="${cls}" src="static/${c}.png" alt="${c}">` : "";
// Live-Pit-Timer: bei der Einfahrt eine Card mit hochzählender Zeit anlegen (Zeitstempel im
// dataset, tickPitCards() zählt flüssig hoch). Alter Reifen wird gemerkt.
function startPitStop(d) {
  const stack = document.getElementById("pit-stack");
  const card = document.createElement("div");
  card.className = "pit-card live";
  card.style.setProperty("--pt", TEAM_COLORS[d.team] || "#fff");
  card.dataset.t0 = String(performance.now());
  card.innerHTML = `<div class="pp-head">IN DER BOX</div>`
    + `<div class="pp-body"><span class="pp-name">${esc(d.name)}</span>`
    + `<span class="pp-tyres">${pitTyreImg(d.compound)}</span>`
    + `<span class="pp-time">0.0s</span></div>`;
  stack.appendChild(card);                                   // neuer Stopp unten an den Stack
  while (stack.children.length > 3) stack.removeChild(stack.firstChild);   // max. 3, ältester raus
  return card;
}
// Frontflügel gilt als gewechselt, wenn er bei der Einfahrt beschädigt war und bei der
// Ausfahrt (fast) heil ist -> das Spiel setzt den Schaden bei neuem Flügel auf ~0.
const FW_CHANGE_MIN = 10;
// Ausfahrt: Live-Timer stoppen, finale Standzeit (d.pit_time) einblenden, Reifenwechsel
// zeigen (falls bekannt/geändert), neuen Frontflügel markieren und die Card nach 5 s ausblenden.
function finishPitStop(card, d, oldC, newC, entryFw) {
  if (!card) return;
  card.classList.remove("live");
  card.querySelector(".pp-head").textContent = "STANDZEIT";
  const tyres = card.querySelector(".pp-tyres");
  if (TYRE_ICONS[oldC] && TYRE_ICONS[newC] && oldC !== newC)
    tyres.innerHTML = `${pitTyreImg(oldC)}<span class="pp-arrow">→</span>${pitTyreImg(newC, "pp-spin")}`;
  else
    tyres.innerHTML = pitTyreImg(newC || oldC);
  // Frontflügel-Wechsel: war beschädigt bei Einfahrt, bei Ausfahrt auf ~0 -> neuer Flügel.
  const curFw = Math.max(d.dmg_fl || 0, d.dmg_fr || 0);
  if ((entryFw || 0) >= FW_CHANGE_MIN && curFw <= entryFw * 0.5) {
    const fw = document.createElement("span");
    fw.className = "pp-fw"; fw.title = "Neuer Frontflügel";
    tyres.insertAdjacentElement("afterend", fw);            // zwischen Reifen und Zeit
  }
  card.querySelector(".pp-time").textContent = d.pit_time > 0 ? d.pit_time.toFixed(1) + "s" : "—";
  setTimeout(() => { card.classList.add("leaving"); setTimeout(() => card.remove(), 400); }, 5000);
}
// Große Zeit der laufenden Pit-Cards flüssig hochzählen (wie tickHotlapTimes).
function tickPitCards() {
  document.querySelectorAll("#pit-stack .pit-card.live").forEach(card => {
    const t0 = parseFloat(card.dataset.t0 || "0");
    const el = card.querySelector(".pp-time");
    if (el) el.textContent = ((performance.now() - t0) / 1000).toFixed(1) + "s";
  });
  requestAnimationFrame(tickPitCards);
}
requestAnimationFrame(tickPitCards);

// Rennleitung: ein Meldungs-Feed oben, der Events nacheinander durchwechselt.
function raceMsg(icon, html, accent) {
  if (!CFG.msgs) return;                      // Rennleitungs-Meldungen per Settings abschaltbar
  rcQueue.push({ icon, html, accent });
  if (rcQueue.length > 10) rcQueue.shift();   // Stau begrenzen
  processRaceMsg();
}
function processRaceMsg() {
  if (rcBusy || !rcQueue.length) return;
  rcBusy = true;
  const m = rcQueue.shift();
  const el = document.getElementById("race-msg");
  el.style.setProperty("--rm-accent", m.accent);
  el.querySelector(".rm-icon").textContent = m.icon;
  el.querySelector(".rm-text").innerHTML = m.html;
  el.classList.add("show");
  setTimeout(() => {
    el.classList.remove("show");
    setTimeout(() => { rcBusy = false; processRaceMsg(); }, 450);   // kurze Pause -> nächste Meldung
  }, 2800);
}

// Kampf-Vorhersage: Schließrate aus gap_to_ahead über Zeit -> grobe Runden bis Kontakt.
function updateBattlePrediction(drivers, active) {
  if (!active) { battlePred = null; return; }
  const now = performance.now() / 1000;
  let best = null;
  drivers.forEach((d, i) => {
    if (i === 0 || d.in_pit || d.dnf || d.dsq) return;
    const g = d.gap_to_ahead, prev = gapSample[d.index];
    if (prev && now - prev.t > 1.2) {
      const rate = (prev.gap - g) / (now - prev.t);
      gapSample[d.index] = { t: now, gap: g };
      if (rate > 0.01 && g > 0.4 && g < 6) {
        const laps = g / (rate * (d.last_lap > 30 ? d.last_lap : 90));
        if (laps >= 1 && laps <= 9 && (!best || laps < best.laps))
          best = { laps: Math.round(laps), aIdx: drivers[i - 1].index, bIdx: d.index };
      }
    } else if (!prev) gapSample[d.index] = { t: now, gap: g };
  });
  battlePred = best;
}

// ── Quali-Ergebnis halten ────────────────────────────────────────────────────
// Nach der Quali das Endergebnis (Tower mit BEST/GAP) weiter anzeigen, bis das Rennen
// startet (Ampeln kommen) ODER CFG.holds (Standard 5 min) vorbei sind. Friert die
// letzten Quali-Standings ein und blendet sie über die normalen (Renn-)Daten.
let qLiveDrv = null, qLiveSes = null, qSnap = null, qSince = 0, qWasQuali = false;
function maybeHoldQuali(data) {
  const s = data.session || {};
  const now = performance.now();
  if (data.connected && s.is_quali && (data.drivers || []).length) {
    qLiveDrv = data.drivers; qLiveSes = s; qWasQuali = true; qSnap = null;
    return data;
  }
  if (qWasQuali && !s.is_quali && !qSnap && qLiveDrv) { qSnap = qLiveDrv; qLiveSes = qLiveSes; qSince = now; }
  if (qSnap) {
    const sl = data.start_lights || {};
    const lights = (sl.num > 0 || sl.out) && sl.age < 30;                 // Rennstart läuft
    const racing = data.connected && !s.is_quali && (s.current_lap || 0) >= 1;
    const expired = (now - qSince) > (CFG.holds || 300) * 1000;
    if (lights || racing || expired) { qSnap = null; qWasQuali = false; return data; }
    return Object.assign({}, data, { drivers: qSnap, connected: true, focus_index: -1, race_control: [],
      session: Object.assign({}, qLiveSes, { _quali_result: true, safety_car_status: "none", time_left: 0 }) });
  }
  return data;
}

// ── Render ────────────────────────────────────────────────────────────────────
async function fetchAndRender() {
  try {
    const res = await fetch("/api/live");
    const data = await res.json();
    render(data);
  } catch(e) { console.error("[] fetch error:", e); }
}

function render(data) {
  applySettings(data.settings);   // Server-Settings live übernehmen (URL-Parameter gewinnen)
  data = maybeHoldQuali(data);    // ggf. eingefrorenes Quali-Ergebnis statt Live-Daten
  const indicator = document.getElementById("liveIndicator");
  const liveText  = document.getElementById("liveText");
  if (data.connected) {
    indicator.className = "live-indicator";
    if (liveText) liveText.textContent = "LIVE";
  } else {
    indicator.className = "live-indicator waiting";
    if (liveText) liveText.textContent = "WAITING";
  }

  const sessionData = data.session || {};

  // F1 26: statt DRS gibt es den "Overtake Mode" (eigenes UDP-Paket) -> Label "MOM".
  const isF126 = sessionData.formula === 13 || /26/.test(sessionData.formula_name || "");
  const boostLabel = isF126 ? "MOM" : "DRS";
  const drsHeader = document.getElementById("drs-header");
  const hdrLeader = document.getElementById("hdr-leader");
  const hdrInterval = document.getElementById("hdr-interval");
  if (sessionData.is_quali) {                 // Quali-Spalten: BEST · GAP · STATUS
    if (hdrLeader) hdrLeader.textContent = "BEST";
    if (hdrInterval) hdrInterval.textContent = "GAP";
    if (drsHeader) drsHeader.textContent = "STATUS";
  } else {
    if (hdrLeader) hdrLeader.textContent = "LEADER";
    if (hdrInterval) hdrInterval.textContent = "INTERVAL";
    if (drsHeader) drsHeader.textContent = boostLabel;
  }
  // Sektor-Bestzeiten + Gap-Historie + Bestrunden-Sektoren bei Session-Wechsel zurücksetzen
  if (sessionData.type !== lastSecType) {
    lastSecType = sessionData.type;
    secBest = [Infinity, Infinity, Infinity];
    for (const k in drvSecBest) delete drvSecBest[k];
    for (const k in bestLapSecs) delete bestLapSecs[k];
    for (const k in prevLastLap) delete prevLastLap[k];
    gapHist = {}; gapLastLap = 0;
    scRestartUntilLap = 0; scOnboardActive = false;
  }

  // Session title
  const titleEl = document.getElementById("sessionTitle");
  const subEl = document.getElementById("sessionSub");

  if (sessionData.is_quali) {
    // Quali: "Q1" im Titel, Zeit im Sub
    if (sessionData.type_name && sessionData.type_name !== "Unbekannt") {
      titleEl.textContent = sessionData.type_name.toUpperCase();
    }
    if (sessionData.time_left > 0) {
      const m = Math.floor(sessionData.time_left / 60);
      const s = Math.floor(sessionData.time_left % 60).toString().padStart(2, "0");
      subEl.textContent = `${m}:${s}`;
    } else {
      subEl.textContent = "";
    }
  } else {
    // Rennen: nur "Runde X / Y" — kein "RENNEN"
    titleEl.textContent = "";
    if (sessionData.total_laps > 0) {
      subEl.textContent = `Runde ${sessionData.current_lap} / ${sessionData.total_laps}`;
    } else {
      subEl.textContent = "";
    }
  }

  if (!lastSession) {
    lastSession = sessionData;
    const el = document.getElementById("ticker-text");
    const items = buildTickerItems(sessionData);
    el.innerHTML = items[0] || "—";
    tickerShown = items[0] || "—";
    el.style.opacity = "1";
  } else {
    lastSession = sessionData;
  }

  // Sectors visible only in quali
  const container = document.getElementById("standings-body");
  const outerContainer = document.querySelector(".leaderboard-container");
  // Sichtbarkeit aus den Settings: Tower + Wetter-Ticker
  outerContainer.style.display = CFG.tower ? "" : "none";
  const tickerWrap = document.querySelector(".ticker-wrap");
  if (tickerWrap) tickerWrap.style.display = CFG.ticker ? "" : "none";
  if (sessionData.is_quali) {
    outerContainer.classList.remove("sectors-hidden");
    outerContainer.classList.add("quali-mode");
  } else {
    outerContainer.classList.add("sectors-hidden");
    outerContainer.classList.remove("quali-mode");
  }

  // "Warte auf Telemetrie" nur zeigen, wenn NOCH NIE Daten kamen ODER das letzte
  // Ergebnis länger als CFG.holds her ist. Direkt nach einer Session bleiben die
  // letzten Standings so 5 Min stehen (kein Ergebnis-Popup mehr nötig).
  if (data.connected) { lastConnTs = performance.now(); everConn = true; }
  const holdResult = everConn && !data.connected && (performance.now() - lastConnTs) / 1000 < (CFG.holds || 300);
  outerContainer.classList.toggle("disconnected", !data.connected && !holdResult);

  // Safety Car / Virtual Safety Car Glow-Rahmen
  const scStatus = data.connected ? sessionData.safety_car_status : "none";
  outerContainer.classList.toggle("sc-active",  scStatus === "sc");
  outerContainer.classList.toggle("vsc-active", scStatus === "vsc");
  // "Safety Car" / "Letzte Runde" als kompaktes Badge direkt neben Runde X/Y
  const finalLap = !sessionData.is_quali && sessionData.total_laps > 0 && sessionData.current_lap >= sessionData.total_laps;
  const flag = document.getElementById("sessionFlag");
  if (flag) {
    if (sessionData._quali_result) { flag.className = "session-flag fin"; flag.textContent = "🏁 Ergebnis"; }
    else if (scStatus === "sc")       { flag.className = "session-flag sc";  flag.textContent = "Safety Car"; }
    else if (scStatus === "vsc") { flag.className = "session-flag sc";  flag.textContent = "Virtual SC"; }
    else if (data.connected && finalLap) { flag.className = "session-flag fin"; flag.textContent = "🏁 Letzte Runde"; }
    else { flag.className = "session-flag"; flag.textContent = ""; }
  }
  // #7: Zielflagge rechts am Tower, sobald die Session zu Ende ist
  // (Quali-Ergebnis-Hold oder Renn-Endergebnis aus der Final Classification).
  const sessionEnded = !!sessionData._quali_result || ((data.final_classification || []).length > 0);
  const ffEl = document.getElementById("finish-flag");
  if (ffEl) ffEl.classList.toggle("show", sessionEnded && !!CFG.tower);
  // Safety-Car-Statuswechsel als Rennleitungs-Meldung
  if (data.connected && scStatus !== lastScMsg) {
    if (scStatus === "sc" || scStatus === "vsc") {
      raceMsg("⚠", scStatus === "sc" ? "SAFETY CAR" : "VIRTUAL SAFETY CAR", "#ffcc00");
      if (!sessionData.is_quali) scOnboardActive = true;   // Onboard-Fenster auf
    }
    else if (scStatus === "none" && (lastScMsg === "sc" || lastScMsg === "vsc")) {
      raceMsg("✓", "RENNEN FREIGEGEBEN", "#00e676");
      // Restart: Onboard auf P1 schalten, bis der Führende Start/Ziel überquert -> dann zu
      const p1 = (data.drivers || []).find(x => x.position === 1);
      if (p1) scRestartUntilLap = (p1.lap_num || 0) + 1;
    }
    lastScMsg = scStatus;
  }

  let drivers = data.drivers || [];
  if (CFG.rows > 0) drivers = drivers.slice(0, CFG.rows);   // nur Top-N zeigen (Settings/URL)

  // Gap-Verlauf mitschreiben (für das G-Chart): pro neuer Runde ein Schnappschuss
  if (!sessionData.is_quali && data.connected) {
    const gl = sessionData.current_lap || 0;
    if (gl > 0 && gl !== gapLastLap) {
      gapLastLap = gl;
      const snap = {};
      drivers.forEach(d => { if (!d.dnf && !d.dsq) snap[d.index] = Math.round((d.gap_to_leader || 0) * 100) / 100; });
      gapHist[gl] = snap;
    }
  }
  const body    = container;
  const tpl     = document.getElementById("row-tpl");

  // #2: Tower immer gleich groß — Höhe fürs VOLLE Feld (FULL_GRID) reservieren, nicht nach der
  // aktuellen Fahrerzahl -> schrumpft nie; fehlende/ausgefallene Fahrer lassen unten Platz frei.
  if (drivers.length > towerMaxRows) towerMaxRows = drivers.length;
  const towerRows = CFG.rows > 0 ? CFG.rows : Math.max(FULL_GRID, towerMaxRows);
  body.style.height = drivers.length ? `${towerRows * ROW_HEIGHT}px` : "0px";

  // Quali: Pole-Zeit (schnellste Bestrunde) + Elimination-Schnitt je Q-Segment
  let poleTime = 0, elimCut = 0;
  if (sessionData.is_quali) {
    const bls = drivers.map(d => d.best_lap || 0).filter(x => x > 0);
    poleTime = bls.length ? Math.min(...bls) : 0;
    if (sessionData.type === 5) elimCut = 16;        // Q1 -> P17–P22 raus
    else if (sessionData.type === 6) elimCut = 10;   // Q2 -> P11–P16 raus
  }

  // Index -> Zeile EINMAL pro Frame mappen (statt O(n²) querySelectorAll je Fahrer)
  // -> deutlich weniger Main-Thread-Arbeit = flüssigere Animationen.
  const rowByIdx = {};
  body.querySelectorAll(".driver-row").forEach(r => { rowByIdx[r.dataset.idx] = r; });

  // Fahrer, die nicht mehr im Feld sind, sanft ausblenden statt hart entfernen.
  const liveKeys = new Set(drivers.map(d => String(d.index)));
  for (const key in rowByIdx) {
    if (!liveKeys.has(key) && !rowByIdx[key].dataset.leaving) {
      const r = rowByIdx[key];
      r.dataset.leaving = "1";
      r.classList.add("leaving");
      setTimeout(() => r.remove(), 450);
    }
  }

  drivers.forEach((d, idx) => {
    // Eindeutiger Fahrer-Index als Key -> identische Namen können keine Zeile "stehlen"
    let row = rowByIdx[String(d.index)] || null;
    if (row && row.dataset.leaving) { row.remove(); row = null; }  // war im Ausblenden, kam zurück
    const isNew = !row;

    if (isNew) {
      const clone = tpl.content.cloneNode(true);
      row = clone.querySelector(".driver-row");
      if (!row) { console.error("Template clone failed!"); return; }
      row.dataset.idx = String(d.index);
      row.classList.add("entering");                               // startet unsichtbar
      // Neue Zeile OHNE Transform-Transition direkt an ihre Position setzen, damit sie
      // dort einblendet statt aus der Ecke heranzugleiten.
      row.style.transition = "none";
      row.style.transform = `translate3d(0,${idx * ROW_HEIGHT}px,0)`;
      body.appendChild(row);
      void row.offsetWidth;                                        // Reflow -> Position "festnageln"
      row.style.transition = "";                                   // CSS-Transition wieder aktiv
      // Im nächsten Frame einblenden -> sanftes Fade-In statt Aufploppen.
      requestAnimationFrame(() => requestAnimationFrame(() => row.classList.remove("entering")));
    }
    // Name kann sich ändern (Participants-Paket kommt nach Lap-Daten) -> immer setzen
    row.querySelector(".driver-name").textContent = d.name;

    const color = TEAM_COLORS[d.team] || "#fff";
    row.querySelector(".team-color-strip").style.backgroundColor = color;
    row.querySelector(".driver-team-sub").textContent = d.team || "";
    setTeamLogo(row.querySelector(".team-logo"), d.team);
    // Damage-Icons: Frontflügel (🛞→ Front) und Heckflügel. Nur im Rennen, ab Schwelle.
    renderDamage(row.querySelector(".dmg-icons"), d, sessionData.is_quali);
    // Strafen/Track-Limits NUR im Rennen (in der Quali gibt es keine) -> sonst ausblenden
    const penEl = row.querySelector(".pen-badge");
    const tlEl  = row.querySelector(".tl-badge");
    if (sessionData.is_quali) {
      if (penEl) { penEl.className = "pen-badge"; penEl.textContent = ""; }
      if (tlEl)  { tlEl.className  = "tl-badge";  tlEl.textContent  = ""; }
    } else {
      // Strafe-Pille: Durchfahrtstrafe (orange) hat Vorrang vor der Zeitstrafe (rot, +Xs)
      if (penEl) {
        penEl.classList.remove("dt");
        if ((d.pen_dt || 0) > 0 && !d.dsq) {
          penEl.textContent = "DT"; penEl.classList.add("dt", "show");
        } else if ((d.penalties || 0) > 0 && !d.dsq) {
          penEl.textContent = "+" + d.penalties + "s"; penEl.classList.add("show");
        } else {
          penEl.classList.remove("show"); penEl.textContent = "";
        }
      }
      // Track-Limits: 1. Verwarnung gelb, 2. orange; bei der 3. gibt es die Strafe
      // (erscheint dann als +Xs) und der Zähler beginnt von vorn -> %3, "immer wieder".
      if (tlEl) {
        const strike = (d.corner_warnings || 0) % 3;   // Verwarnungen im aktuellen Zyklus (3 = Strafe, Reset)
        tlEl.classList.remove("warn1", "warn2");
        if ((strike === 1 || strike === 2) && !d.dsq) {
          tlEl.textContent = String(strike);            // nur die Zahl der Verwarnungen statt "TL"
          tlEl.classList.add(strike === 1 ? "warn1" : "warn2", "show");
        } else { tlEl.classList.remove("show"); tlEl.textContent = ""; }
      }
    }

    row.querySelector(".rank").textContent = d.position;
    const isFl = sessionData.fastest_lap_driver && d.name === sessionData.fastest_lap_driver;
    // Nur die Zustands-Klassen togglen statt className zu überschreiben -> entering/leaving
    // (Fade-In/-Out) bleiben erhalten.
    row.classList.add("leaderboard-row", "driver-row");
    row.classList.toggle("rank-1", d.position === 1);
    row.classList.toggle("rank-2", d.position === 2);   // Silber
    row.classList.toggle("rank-3", d.position === 3);   // Bronze
    row.classList.toggle("fl-lap", isFl);
    row.classList.toggle("elim-zone", elimCut > 0 && d.position > elimCut);   // Quali: Aus-Zone
    row.dataset.even = idx % 2 === 0 ? "1" : "0";
    row.classList.toggle("focused", data.focus_index != null && data.focus_index >= 0 && d.index === data.focus_index);

    const prevIdx = prevStandings.findIndex(p => p.index === d.index);
    const ind = row.querySelector(".change-indicator");
    if (!isNew && prevIdx !== -1 && prevIdx !== idx) {
      const gained = prevIdx > idx;   // kleinerer Index = weiter vorne = Platz gewonnen
      ind.innerHTML = gained ? "▲" : "▼";
      ind.className = `change-indicator ${gained ? "change-up" : "change-down"}`;
      row.dataset.lastMove = Date.now();
      // Positions-Flash: Nummer kurz grün (gewonnen) / rot (verloren) aufleuchten.
      const posEl = row.querySelector(".col-pos");
      posEl.classList.remove("pos-flash-up", "pos-flash-down");
      void posEl.offsetWidth;         // Reflow erzwingen -> Animation startet neu
      posEl.classList.add(gained ? "pos-flash-up" : "pos-flash-down");
    } else if (Date.now() - parseInt(row.dataset.lastMove || 0) > 5000) {
      ind.innerHTML = "-";
      ind.className = "change-indicator change-none";
    }

    // Smooth reorder: CSS-Transition interpoliert von der aktuellen Position,
    // auch wenn mitten in einer laufenden Bewegung ein neues Ziel kommt.
    const newY = idx * ROW_HEIGHT;
    row.style.transform = `translate3d(0,${newY}px,0)`;

    const gapEl = row.querySelector(".col-gap");
    const lapEl = row.querySelector(".col-lap");
    if (sessionData.is_quali) {
      // BEST = eigene Bestrunde, GAP = Rückstand auf Pole
      const bl = d.best_lap || 0;
      gapEl.className = "col-gap"; gapEl.style.display = "";
      gapEl.textContent = bl > 0 ? fmtTime(bl) : "—";
      lapEl.style.display = "";
      if (bl > 0 && poleTime > 0) {
        const gp = bl - poleTime;
        if (gp < 0.0005) { lapEl.textContent = "POLE"; lapEl.className = "col-lap leader"; }
        else { lapEl.textContent = "+" + gp.toFixed(3); lapEl.className = "col-lap"; }
      } else { lapEl.textContent = "—"; lapEl.className = "col-lap no-data"; }
    } else if (d.dsq) {
      gapEl.textContent = "DSQ"; gapEl.className = "col-gap dsq";
      lapEl.textContent = "—";   lapEl.className = "col-lap no-data"; lapEl.style.display = "";
    } else if (d.dnf) {
      gapEl.textContent = "DNF"; gapEl.className = "col-gap dnf";
      lapEl.textContent = "—";   lapEl.className = "col-lap no-data"; lapEl.style.display = "";
    } else if (d.position === 1) {
      // Führender: "LEADER"-Banner über beide Gap-Spalten
      gapEl.textContent = "LEADER"; gapEl.className = "col-gap leader leader-banner";
      lapEl.textContent = "";       lapEl.className = "col-lap"; lapEl.style.display = "none";
    } else if (d.laps_down >= 1) {
      // Überrundet: statt Zeitabstand die Runden-Differenz zum Führenden
      gapEl.textContent = "+" + d.laps_down + (d.laps_down === 1 ? " LAP" : " LAPS");
      gapEl.className = "col-gap lapped";
      lapEl.textContent = fmtGap(d.gap_to_ahead);  lapEl.className = "col-lap"; lapEl.style.display = "";
    } else {
      gapEl.textContent = fmtGap(d.gap_to_leader); gapEl.className = "col-gap";
      lapEl.textContent = fmtGap(d.gap_to_ahead);  lapEl.className = "col-lap"; lapEl.style.display = "";
    }

    setTyreIcon(row.querySelector(".tyre-icon"), d.compound);
    row.querySelector(".tyre-age").innerHTML = `Rnd <b>${d.tyre_age}</b>`;
    // Pit-Popup erst bei der Boxen-AUSFAHRT: dann ist die Standzeit final (vorher zeigt
    // der Pit-Timer 0 bzw. einen noch laufenden Wert -> "falsche Zeit"). Und nicht in
    // Runde 1 (Rennstart-Compound-Setzen ist kein Boxenstopp).
    const pt = pitTrack[d.index] || (pitTrack[d.index] = { in: false, comp: d.compound, card: null });
    // Live-Pit-Timer (nur Rennen, ab Runde 2 -> der Startaufstellungs-Compound zählt nicht,
    // und nicht für DNF/DSQ-Fahrer). Einfahrt startet die hochzählende Card, Ausfahrt blendet
    // die finale Standzeit ein. Bei Einfahrt merken wir alten Reifen + Frontflügel-Schaden.
    if (d.in_pit && !pt.in) {
      pt.in = true; pt.comp = d.compound; pt.fw = Math.max(d.dmg_fl || 0, d.dmg_fr || 0);
      pt.card = (!sessionData.is_quali && (sessionData.current_lap || 0) >= 2 && !d.dnf && !d.dsq)
                ? startPitStop(d) : null;
    } else if (!d.in_pit && pt.in) {
      pt.in = false;
      if (pt.card) { finishPitStop(pt.card, d, pt.comp, d.compound, pt.fw || 0); pt.card = null; }
    }
    // DNF/DSQ während des Stopps -> laufende Card sofort entfernen (kein Ergebnis anzeigen).
    if ((d.dnf || d.dsq) && pt.card) { pt.card.remove(); pt.card = null; }

    const s3 = (d.last_lap > 0 && d.sector1 > 0 && d.sector2 > 0)
      ? d.last_lap - d.sector1 - d.sector2 : 0;
    // Rundenende erkennen: beim Überfahren der Start/Ziel-Linie setzt das Spiel sector1/
    // sector2 der NEUEN Runde schon auf 0 -> für S3 der GERADE beendeten Runde die zuletzt
    // gesehenen S1/S2 nehmen (sonst fehlt S3 auf Inlap/Box/Outlap – "teilweise", je nach
    // Paket-Timing). S3-Bestsektor + Bestrunden-Sektoren daraus mitführen.
    if (sessionData.is_quali && d.last_lap > 0 && prevLastLap[d.index] !== d.last_lap) {
      prevLastLap[d.index] = d.last_lap;
      const ls = lastQualiSecs[d.index];
      const s1c = d.sector1 > 0 ? d.sector1 : (ls ? ls[0] : 0);
      const s2c = d.sector2 > 0 ? d.sector2 : (ls ? ls[1] : 0);
      const s3c = (s1c > 0 && s2c > 0) ? d.last_lap - s1c - s2c : 0;
      if (s3c > 0) {
        const pb = drvSecBest[d.index] || (drvSecBest[d.index] = [Infinity, Infinity, Infinity]);
        if (s3c < pb[2]) pb[2] = s3c;                 // Bestsektor S3 mitführen
        if (s3c < secBest[2]) secBest[2] = s3c;       // Session-Best S3
        if (Math.abs(d.last_lap - (d.best_lap || 0)) < 0.005)
          bestLapSecs[d.index] = [s1c, s2c, s3c];     // Sektoren der Bestrunde einfrieren
      }
    }
    // Zuletzt gültige S1/S2 der laufenden Runde merken -> überlebt den S/Z-Reset für S3 oben.
    if (d.sector1 > 0 && d.sector2 > 0) lastQualiSecs[d.index] = [d.sector1, d.sector2];
    // Quali-Status (Box/Outlap/Inlap/Hotlap) einmal bestimmen, für Sektoren UND Statuspille.
    const qualiSt = qualiStatus(d);
    if (sessionData.is_quali) {
      if (qualiSt === "track") {
        // Hotlap / on track -> aktuell gefahrene Sektoren (und Bestzeiten mitführen)
        row.querySelector(".s1").textContent = fmtTime(d.sector1) || "—";
        row.querySelector(".s2").textContent = fmtTime(d.sector2) || "—";
        row.querySelector(".s3").textContent = fmtTime(s3) || "—";
        colorSectors(row, d.index, [d.sector1, d.sector2, s3]);
      } else {
        // Box / Outlap -> schnellste (Best-)Sektoren des Fahrers
        showBestSectors(row, d.index);
      }
    } else {
      row.querySelector(".s1").textContent = fmtTime(d.sector1) || "—";
      row.querySelector(".s2").textContent = fmtTime(d.sector2) || "—";
      row.querySelector(".s3").textContent = fmtTime(s3) || "—";
      clearSectorColors(row);
      updateRaceBest(d.index, [d.sector1, d.sector2, s3]);   // Basis für den Onboard-Delta-Balken
    }
    // Q5: ungültige (Track-Limits-)Runde auf einem Hotlap -> Sektoren rot
    row.classList.toggle("lap-invalid", sessionData.is_quali && qualiSt === "track" && !!d.lap_invalid);

    const drsEl = row.querySelector(".col-drs");
    if (sessionData.is_quali) {
      drsEl.textContent = qualiSt === "track" ? "HOTLAP" : qualiSt === "inlap" ? "INLAP"
                        : qualiSt === "out" ? "OUTLAP" : "BOX";
      drsEl.className = "col-drs st st-" + qualiSt;
    } else if (d.dnf || d.dsq) {
      // Ausgeschieden: "PIT" nur wenn in der Box aufgegeben, sonst nichts anzeigen.
      drsEl.textContent = d.in_pit ? "PIT" : "";
      drsEl.className   = d.in_pit ? "col-drs in-pit-q" : "col-drs";
    } else if (d.in_pit) {
      drsEl.textContent = "PIT";
      drsEl.className   = "col-drs in-pit-q";
    } else {
      drsEl.textContent = boostLabel;
      if (isF126) {
        // 2026 Overtake Mode (Car-Telemetry-2-Paket): blau leuchtend wenn aktiv,
        // dezent blau wenn verfügbar (im 1s-Fenster), sonst aus.
        drsEl.className = d.overtake_active ? "col-drs boost-active"
                       : d.overtake_available ? "col-drs boost-ready"
                       : "col-drs";
      } else {
        drsEl.className = d.drs ? "col-drs active" : "col-drs";
      }
    }
  });

  // Rennleitung: nur das Wichtige — Track Limits (gelb) und Strafen (rot).
  // (Überholungen werden bewusst NICHT mehr gemeldet.)
  const rc = data.race_control || [];
  if (rc.length && rc[rc.length - 1].id < lastRcId) lastRcId = 0;   // neue Session -> IDs neu
  rc.forEach(mEntry => {
    if (mEntry.id <= lastRcId) return;
    lastRcId = mEntry.id;
    if (mEntry.type === "penalty") raceMsg("⚑", esc(mEntry.text), "#ff5a5a");
    else if (mEntry.type === "tracklimit") raceMsg("⚠", esc(mEntry.text), "#ffcc00");
    else if (mEntry.type === "mom") raceMsg("⚡", esc(mEntry.text), "#2fd9ff");
    else if (mEntry.type === "fl") { /* großes FL-Banner übernimmt (updateFLBanner) */ }
    else if (mEntry.type === "retire") raceMsg("✖", esc(mEntry.text), "#b0b6c0");
    else if (mEntry.type === "redflag") { raceMsg("⚑", esc(mEntry.text), "#ff2a1a"); redFlagUntil = Date.now() + 15000; }
    else if (mEntry.type === "winner") raceMsg("🏆", esc(mEntry.text), "#ffd700");
    else if (mEntry.type === "flag") raceMsg("🏁", esc(mEntry.text), "#ffffff");
    else if (mEntry.type === "penserved") raceMsg("✓", esc(mEntry.text), "#00e676");
    else raceMsg("•", esc(mEntry.text), "#9aa0aa");
  });
  // Rote Flagge: roter Glow-Rahmen für 15s nach dem RDFL-Event
  outerContainer.classList.toggle("rf-active", data.connected && Date.now() < redFlagUntil);
  // Elimination-Linie positionieren
  const elimLine = document.getElementById("elim-line");
  if (elimLine) {
    if (elimCut > 0) { elimLine.style.display = "block"; elimLine.style.top = (elimCut * ROW_HEIGHT) + "px"; }
    else elimLine.style.display = "none";
  }
  updateBattlePrediction(drivers, data.connected && !sessionData.is_quali);

  // Tower auf die Canvas-Höhe einpassen, damit das komplette Feld (P1..letzter)
  // sichtbar bleibt und unten nichts abgeschnitten wird. Skaliert von oben-links,
  // bleibt also links verankert.
  outerContainer.style.transformOrigin = "top left";
  if (CFG.scale > 0) {
    outerContainer.style.transform = `scale(${CFG.scale})`;   // fester Faktor aus der URL
  } else {
    const stageH   = window.innerHeight || 1080;
    const naturalH = outerContainer.offsetHeight;          // ungescalete Layout-Höhe
    const availH   = (stageH - 40) * 0.80;                  // Tower nur ~80% der Höhe -> kompakter, nicht über den ganzen Screen
    const fit      = naturalH > availH ? availH / naturalH : 1;
    outerContainer.style.transform = fit < 1 ? `scale(${fit.toFixed(4)})` : "";
  }

  // Battles erst ab Runde 3 (kein Chaos-Gedränge direkt nach dem Start), Quali nie
  updateBattleBox(drivers, CFG.battles && data.connected && !sessionData.is_quali && (sessionData.current_lap || 0) >= 3);
  updateHotlapBoxes(drivers, data.connected && sessionData.is_quali && !sessionData._quali_result);  // Quali: Hot-Lap-Tracker (nicht im Ergebnis)

  // ── Neue Features ──
  updateStartLights(data.start_lights, data.connected);
  updateOnboard(drivers, data.focus_index, data.connected, sessionData);
  updateTrackmap(drivers, data.focus_index, data.connected, sessionData);
  updateFLBanner(sessionData, data.connected);
  updateLowerThird(drivers, data.focus_index, sessionData, data.connected);
  updateGridScreen(data, sessionData, drivers);
  updateUndercut(drivers, sessionData, data.connected);
  lastLapCount = sessionData.current_lap || lastLapCount;
  lastDrivers = drivers;

  prevStandings = drivers;
}

// ── Bottom-center "Battle"-Box (2+ Fahrer, ganze Kampfgruppe) ──────────────────
const BATTLE_THRESH = 1.5;   // Abstand zum Vordermann < 1,5 s = "im Kampf"
const BATTLE_MAX    = 6;     // max. Fahrer in der Box

const teamColor = team => TEAM_COLORS[team] || "#fff";

const BATTLE_ROW_H = 44;   // Höhe einer Battle-Zeile (px)
function barStyle(gap) {
  const close = Math.max(0, Math.min(1, (1.0 - gap) / 1.0));   // erst < 1,0 s aktiv, voll bei 0
  return `width:${(close * 100).toFixed(0)}%;background:rgb(255,${Math.round(204 - 140 * close)},${Math.round(64 * close)})`;
}
function battleRowHTML(d, gap) {
  const tyre = tyreIconHTML(d.compound);
  const lead = gap == null;   // Spitze der Gruppe -> kein Vordermann
  const gapSpan = lead ? `<span class="bd-gap bd-gap-lead">—</span>` : `<span class="bd-gap">+${gap.toFixed(3)}</span>`;
  const bar = `<div class="gap-bar" style="${lead ? "display:none" : ""}"><div class="gap-bar-fill" style="${lead ? "" : barStyle(gap)}"></div></div>`;
  const name = (d.name || "").replace(/</g, "&lt;");
  return `<div class="battle-row" data-idx="${d.index}" style="--row-team:${teamColor(d.team)}">`
       + `<span class="bd-pos">${d.position}</span>`
       + `<span class="bd-name">${name}</span>`
       + `<span class="bd-right">${gapSpan}${tyre}</span>`   // Reifen rechts außen
       + bar + `</div>`;   // horizontaler Gap-Balken an der Unterkante
}

function setRowTyre(row, d) {
  setTyreIcon(row.querySelector(".bd-tyre"), d.compound);
}
function setRowGap(row, gap) {
  const el = row.querySelector(".bd-gap");
  const bar = row.querySelector(".gap-bar");
  if (gap == null) {
    if (el.textContent !== "—") el.textContent = "—";
    if (el.className !== "bd-gap bd-gap-lead") el.className = "bd-gap bd-gap-lead";
    if (bar) bar.style.display = "none";
    return;
  }
  el.textContent = "+" + gap.toFixed(3);
  if (el.className !== "bd-gap") el.className = "bd-gap";
  if (bar) { bar.style.display = ""; bar.querySelector(".gap-bar-fill").style.cssText = barStyle(gap); }
}

function showBattleBox(box) {
  const wasHiding = box.dataset.hiding === "1";
  box.dataset.hiding = "0";
  box.classList.remove("out");
  if (box.style.display !== "block" || wasHiding) {
    box.style.display = "block";
    box.classList.remove("in"); void box.offsetWidth; box.classList.add("in");
  }
}
function hideBattleBox(box) {
  if (box.style.display === "none" || box.dataset.hiding === "1") return;
  box.dataset.hiding = "1";
  box.classList.remove("in");
  box.classList.add("out");
  setTimeout(() => {
    if (box.dataset.hiding === "1") {
      box.style.display = "none";
      box.classList.remove("out");
      box.dataset.hiding = "0";
      const rows = box.querySelector(".battle-rows");
      rows.innerHTML = ""; rows.dataset.members = "";
    }
  }, 700);
}

// Battle-Erkennung mit Hysterese + ruhiger Box-Verwaltung (kein hektisches
// Auf/Zu/Umsortieren mehr):
//  - Link entsteht bei < battlethresh, löst sich erst bei > battlethresh + 0,6 s
//  - neue Gruppen erscheinen erst nach 2 s Bestand (kein Aufblitzen bei Gap-Dips)
//  - Boxen behalten "ihre" Gruppe (Zuordnung über gemeinsame Fahrer, kein Slot-Shuffle)
//  - eine sichtbare Box bleibt mindestens 4 s stehen
const battleLink = {};    // followerIdx -> Link aktiv (Hysterese)
const groupSeen = {};     // Gruppen-Signatur -> erstes Auftreten
function findBattleGroups(drivers) {
  const groups = [];
  let cur = [];
  const enter = CFG.battlethresh || BATTLE_THRESH, exitG = enter + 0.6;
  const flush = () => { if (cur.length >= 2) groups.push(cur); };
  for (const d of drivers) {
    if (d.dnf || d.dsq || d.in_pit) { battleLink[d.index] = false; flush(); cur = []; continue; }
    if (cur.length === 0) { cur = [d]; continue; }
    const g = d.gap_to_ahead;
    const linked = g > 0 && (g < enter || (battleLink[d.index] && g < exitG));
    battleLink[d.index] = linked;
    if (linked) cur.push(d);
    else { flush(); cur = [d]; }
  }
  flush();
  return groups;
}

function renderBattleBox(box, g) {
  const front = g[0], back = g[g.length - 1];
  box.querySelector(".battle-header").textContent = g.length === 2
    ? `BATTLE FOR P${front.position}`
    : `BATTLE · P${front.position}–P${back.position}`;
  const sub = box.querySelector(".battle-sub");
  const inGroup = battlePred && g.some(d => d.index === battlePred.aIdx) && g.some(d => d.index === battlePred.bIdx);
  if (inGroup) {
    const laps = battlePred.laps;
    sub.innerHTML = `<span class="bs-ico">⚔</span><span class="bs-txt">Kampf in</span>`
      + `<span class="bs-laps${laps <= 1 ? " now" : ""}">${laps}</span>`
      + `<span class="bs-unit">${laps === 1 ? "Runde" : "Runden"}</span>`;
    if (sub.dataset.laps !== String(laps)) {        // bei Änderung kurz "poppen"
      sub.dataset.laps = String(laps);
      const ln = sub.querySelector(".bs-laps");
      ln.classList.remove("bs-pop"); void ln.offsetWidth; ln.classList.add("bs-pop");
    }
    sub.classList.add("show");
  } else {
    sub.classList.remove("show");
    sub.textContent = "";
    sub.dataset.laps = "";
  }
  syncBattleRows(box.querySelector(".battle-rows"), g);
}

function updateBattleBox(drivers, connected) {
  const boxes = [...document.querySelectorAll("#battle-area .battle-box")];
  const now = performance.now();
  let groups = connected ? findBattleGroups(drivers) : [];
  groups.sort((a, b) => a[0].position - b[0].position);
  groups = groups.slice(0, boxes.length + 2).map(g => g.length > BATTLE_MAX ? g.slice(0, BATTLE_MAX) : g);
  // Reifezeit: Gruppe (Signatur = vorderste zwei Fahrer) muss 2 s bestehen, bevor sie erscheint
  const seenNow = new Set();
  const ready = [];
  groups.forEach(g => {
    const sig = g[0].index + "-" + g[1].index;
    seenNow.add(sig);
    if (!groupSeen[sig]) groupSeen[sig] = now;
    if (now - groupSeen[sig] >= 2000) ready.push(g);
  });
  for (const s in groupSeen) if (!seenNow.has(s)) delete groupSeen[s];
  // Sticky-Zuordnung: zuerst die Boxen bedienen, die diese Gruppe schon zeigen
  const assigned = new Array(boxes.length).fill(null);
  const usedGroups = new Set();
  const boxMembers = boxes.map(b => new Set((b.querySelector(".battle-rows").dataset.members || "")
    .split(",").filter(Boolean).map(Number)));
  ready.forEach(g => {
    let best = -1, bestOv = 1;    // mind. 2 gemeinsame Fahrer = "gleiche" Gruppe
    boxes.forEach((b, k) => {
      if (assigned[k] || b.style.display !== "block") return;
      const ov = g.filter(d => boxMembers[k].has(d.index)).length;
      if (ov > bestOv) { bestOv = ov; best = k; }
    });
    if (best >= 0) { assigned[best] = g; usedGroups.add(g); }
  });
  ready.forEach(g => {            // übrige (neue) Gruppen in freie Boxen
    if (usedGroups.has(g)) return;
    let k = boxes.findIndex((b, i) => !assigned[i] && b.style.display !== "block");
    if (k < 0) k = assigned.findIndex(a => a === null);
    if (k >= 0) { assigned[k] = g; usedGroups.add(g); }
  });
  boxes.forEach((box, k) => {
    const g = assigned[k];
    if (g) {
      if (box.style.display !== "block") box.dataset.born = String(now);
      showBattleBox(box);
      renderBattleBox(box, g);
    } else {
      // Mindestanzeige: Box bleibt 4 s stehen (friert kurz ein), dann sauber raus
      const born = parseFloat(box.dataset.born || "0");
      if (connected && box.style.display === "block" && now - born < 4000) return;
      hideBattleBox(box);
    }
  });
}

function syncBattleRows(rowsEl, g) {
  rowsEl.style.height = (g.length * BATTLE_ROW_H) + "px";
  const memberSig = g.map(d => d.index).sort((a, b) => a - b).join(",");
  if (rowsEl.dataset.members !== memberSig) {
    // Andere Fahrer im Kampf -> sauber neu aufbauen (sonst überlappen alte/neue Zeilen).
    rowsEl.dataset.members = memberSig;
    rowsEl.innerHTML = "";
    g.forEach((d, i) => {
      rowsEl.insertAdjacentHTML("beforeend", battleRowHTML(d, i === 0 ? null : d.gap_to_ahead));
      const row = rowsEl.lastElementChild;
      row.classList.add("entering");
      row.style.transition = "none";
      row.style.transform = `translateY(${i * BATTLE_ROW_H}px)`;
      void row.offsetWidth;
      row.style.transition = "";
      requestAnimationFrame(() => requestAnimationFrame(() => row.classList.remove("entering")));
    });
  } else {
    // Gleiche Fahrer -> Position smooth verschieben (CSS-Transition) + Werte aktualisieren.
    g.forEach((d, i) => {
      const row = rowsEl.querySelector(`[data-idx="${d.index}"]`);
      if (!row) return;
      row.style.transform = `translateY(${i * BATTLE_ROW_H}px)`;
      row.querySelector(".bd-pos").textContent = d.position;
      row.style.setProperty("--row-team", teamColor(d.team));
      setRowTyre(row, d);
      setRowGap(row, i === 0 ? null : d.gap_to_ahead);
    });
  }
}

// ── Quali: Hot-Lap-Boxen (wer ist gerade auf einer fliegenden Runde?) ──────────
// Zeigt unten mittig je Fahrer auf On-Track/Hotlap: laufende Zeit, Live-Delta zu
// den Session-Bestsektoren, die Live-Sektoren (farbcodiert) und die Pole-Referenz.
function hideHotlapBox(box) {
  if (box.style.display === "none" || box.dataset.hiding === "1") return;
  box.dataset.hiding = "1";
  box.classList.remove("in");
  box.classList.add("out");
  setTimeout(() => {
    if (box.dataset.hiding === "1") {
      box.style.display = "none";
      box.classList.remove("out");
      box.dataset.hiding = "0";
      box.dataset.idx = "";
    }
  }, 450);
}
function showHotlapBox(box) {
  const wasHiding = box.dataset.hiding === "1";
  box.dataset.hiding = "0";
  box.classList.remove("out");
  if (box.style.display !== "block" || wasHiding) {
    box.style.display = "block";
    box.classList.remove("in"); void box.offsetWidth; box.classList.add("in");
  }
}
// Sektor-Farbe wie im Tower (lila = Session-Best, grün = persönlich, gelb = langsamer).
// Nur lesend: secBest/drvSecBest werden vorher in der Tower-Schleife gepflegt.
function hlSecClass(v, idx, i) {
  if (!(v > 0)) return "";
  const pb = drvSecBest[idx];
  if (v <= secBest[i] + 0.005) return "sp";
  if (pb && v <= pb[i] + 0.005) return "sg";
  return "sy";
}
function buildHotlapSkeleton(box) {
  box.innerHTML =
      `<div class="hl-head"><span class="hl-dot"></span><span class="hl-title">Hot Lap</span>`
    + `<span class="hl-pos"></span><img class="hl-tyre" alt=""></div>`
    + `<div class="hl-body">`
    +   `<div class="hl-namerow"><img class="hl-logo" alt=""><span class="hl-name"></span></div>`
    +   `<div class="hl-timerow"><span class="hl-time"></span><span class="hl-delta"></span></div>`
    +   `<div class="hl-sectors">`
    +     `<div class="hl-sec"><div class="lbl">S1</div><div class="val s1">—</div></div>`
    +     `<div class="hl-sec"><div class="lbl">S2</div><div class="val s2">—</div></div>`
    +     `<div class="hl-sec"><div class="lbl">S3</div><div class="val s3">—</div></div>`
    +   `</div>`
    + `</div>`;
}
function updateHotlapBox(box, d) {
  box.style.setProperty("--hl-team", teamColor(d.team));
  if (box.dataset.idx !== String(d.index)) { box.dataset.idx = String(d.index); buildHotlapSkeleton(box); }
  box.querySelector(".hl-pos").textContent = "P" + d.position;
  box.querySelector(".hl-name").textContent = d.name;
  setTeamLogo(box.querySelector(".hl-logo"), d.team);
  setTyreIcon(box.querySelector(".hl-tyre"), d.compound);
  box.classList.toggle("invalid", !!d.lap_invalid);

  // s3 erst bekannt, wenn die Runde komplett ist (last_lap - s1 - s2)
  const s3 = (d.last_lap > 0 && d.sector1 > 0 && d.sector2 > 0) ? d.last_lap - d.sector1 - d.sector2 : 0;
  const secs = [d.sector1, d.sector2, s3];

  // Große Zeit = LIVE hochzählende Rundenzeit. Basiswert + Zeitstempel merken; der
  // rAF-Loop tickHotlapTimes() zählt zwischen den 200-ms-Datenupdates flüssig weiter.
  let done = 0;
  secs.forEach(v => { if (v > 0) done++; });   // Anzahl fertiger Sektoren (fürs Delta unten)
  const clt = d.current_lap_time || 0;
  if (clt > 0) {
    box.dataset.tBase = String(clt);
    box.dataset.tAt = String(performance.now());
    box.dataset.tick = "1";
  } else {
    box.dataset.tick = "0";
    box.querySelector(".hl-time").textContent = d.last_lap > 0 ? fmtTime(d.last_lap) : "—";
  }

  // Live-Delta gegen die Session-Bestsektoren bis zum aktuellen Sektor
  let delta = 0, haveDelta = false;
  for (let i = 0; i < done; i++) { if (secBest[i] < Infinity) { delta += secs[i] - secBest[i]; haveDelta = true; } }
  const dEl = box.querySelector(".hl-delta");
  if (haveDelta) {
    const up = delta <= 0.0005;
    dEl.textContent = (up ? "−" : "+") + Math.abs(delta).toFixed(3);
    dEl.className = "hl-delta " + (up ? "up" : "down");
  } else { dEl.textContent = ""; dEl.className = "hl-delta"; }

  ["s1", "s2", "s3"].forEach((cls, i) => {
    const el = box.querySelector(".hl-sec .val." + cls);
    el.textContent = fmtTime(secs[i]) || "—";
    el.className = "val " + cls + " " + hlSecClass(secs[i], d.index, i);
  });
}
function updateHotlapBoxes(drivers, active) {
  const boxes = document.querySelectorAll("#hotlap-area .hotlap-box");
  // Fahrer auf fliegender Runde (On-Track/Hotlap), beste Position zuerst
  let hot = [];
  if (active) {
    hot = drivers.filter(d => qualiStatus(d) === "track" && !d.dnf && !d.dsq)
                 .sort((a, b) => a.position - b.position).slice(0, boxes.length);
  }
  boxes.forEach((box, k) => {
    const d = hot[k];
    if (!d) { hideHotlapBox(box); return; }
    showHotlapBox(box);
    updateHotlapBox(box, d);
  });
}

// Hotlap-Großzeit flüssig hochzählen (rAF interpoliert zwischen den 200-ms-Datenupdates)
function tickHotlapTimes() {
  document.querySelectorAll("#hotlap-area .hotlap-box").forEach(box => {
    if (box.style.display === "none" || box.dataset.tick !== "1") return;
    const base = parseFloat(box.dataset.tBase || "0");
    const at   = parseFloat(box.dataset.tAt || "0");
    const el = box.querySelector(".hl-time");
    if (el) el.textContent = fmtTime(base + (performance.now() - at) / 1000) || "—";
  });
  requestAnimationFrame(tickHotlapTimes);
}
requestAnimationFrame(tickHotlapTimes);

let lastLapCount = 0;

// ── Damage-Icons ────────────────────────────────────────────────────────────
// Front-/Heckflügelschaden als kleine Icons. Schwellen: >30% = gelb, >60% = rot (blinkt).
const DMG_MIN = 15;              // darunter gilt als unbeschädigt (kein Farb-Highlight)
const DMG_NEUTRAL = "#3a3a44";   // unbeschädigtes Teil (dunkel)
// Schaden-% -> Farbe: gelb (leicht) über orange nach rot (schwer).
function dmgColor(pct) {
  if (pct < DMG_MIN) return DMG_NEUTRAL;
  const f = Math.max(0, Math.min(1, (pct - 25) / 60));   // 25%..85% -> gelb..rot
  return `rgb(255,${Math.round(208 - 170 * f)},${Math.round(24 * (1 - f))})`;
}
// Flügel-Icon aus dem Bild (per CSS-Maske) in der Schadensfarbe.
function wingSpan(kind, label, pct) {
  const crit = pct > (CFG.dmgcrit || 60) ? " crit" : "";
  return `<span class="dmg-wing ${kind}${crit}" style="background-color:${dmgColor(pct)}" `
    + `title="${label} ${pct}%"></span>`;
}
function renderDamage(el, d, isQuali) {
  if (!CFG.damage || isQuali) { if (el.childElementCount) { el.innerHTML = ""; el.dataset.sig = ""; } return; }
  const fl = d.dmg_fl || 0, fr = d.dmg_fr || 0, rw = d.dmg_rw || 0;
  const sig = fl + "|" + fr + "|" + rw;
  if (el.dataset.sig === sig) return;             // nur bei Änderung neu bauen
  el.dataset.sig = sig;
  let html = "";
  if (fl >= DMG_MIN) html += wingSpan("dw-fwl", "Frontflügel links", fl);
  if (fr >= DMG_MIN) html += wingSpan("dw-fwr", "Frontflügel rechts", fr);
  if (rw >= DMG_MIN) html += wingSpan("dw-rw", "Heckflügel", rw);
  el.innerHTML = html;
}

// ── Start-Ampel ─────────────────────────────────────────────────────────────
// STLG meldet die Anzahl leuchtender Lichter (1..5), LGOT = alle aus (Start frei).
// age = Sekunden seit dem letzten Event -> nach ein paar Sekunden ausblenden.
const slEl = document.getElementById("start-lights");
const slLamps = () => slEl.querySelectorAll(".sl-lamp");
function updateStartLights(sl, connected) {
  if (!CFG.lights || !sl || !connected) { slEl.classList.remove("show", "lightsout"); return; }
  const { num, out, age } = sl;
  if (out) {
    // "Lights Out" 3 s lang zeigen, dann weg
    if (age < 3.0) { slEl.classList.add("show", "lightsout"); }
    else slEl.classList.remove("show", "lightsout");
  } else if (num > 0 && age < 8.0) {
    // Lichter gehen nacheinander an (Säulen von links)
    slEl.classList.add("show");
    slEl.classList.remove("lightsout");
    slLamps().forEach((l, i) => l.classList.toggle("on", Math.floor(i / 2) < num));
  } else {
    slEl.classList.remove("show", "lightsout");
  }
}

// (Endergebnis-Tafel entfernt: nach Session-Ende bleiben die letzten Standings
//  einfach 5 Min im Leaderboard stehen -> siehe holdResult in render().)

// ── Onboard-Telemetrie ──────────────────────────────────────────────────────
// RENNEN: nur im Safety-Car-Fenster sichtbar (an sobald SC/VSC kommt, aus sobald der
//   Führende nach dem Restart über Start/Ziel gefahren ist). Zeigt beim Restart P1.
// QUALI: wie gehabt sichtbar (Kamera-Fahrer + Δ-Balken auf dem Hotlap).
const obEl = document.getElementById("onboard");
let scRestartUntilLap = 0;   // SC-Restart: Onboard zeigt P1, bis P1 über Start/Ziel ist
let scOnboardActive = false; // Rennen: Onboard-Fenster (SC bis Restart-Überfahrt)
function updateOnboard(drivers, focusIdx, active, session) {
  const raceVisible = scOnboardActive || scRestartUntilLap > 0;
  // Quali: braucht einen Kamera-Fahrer. Rennen: nur im Safety-Car-Fenster sichtbar
  // (dann IMMER P1, egal auf wen die Kamera schaut).
  const visible = CFG.onboard && active
                  && (session.is_quali ? (focusIdx != null && focusIdx >= 0) : raceVisible);
  if (!visible) { obEl.classList.remove("show"); return; }

  let d;
  if (session.is_quali) {
    d = drivers.find(x => x.index === focusIdx);
  } else {
    // Rennen im SC-Fenster: Onboard zeigt IMMER P1. Fenster schließt erst, wenn das SC weg
    // IST und P1 über Start/Ziel gefahren ist (scRestartUntilLap wird bei SC-Ende gesetzt).
    d = drivers.find(x => x.position === 1);
    if (scRestartUntilLap > 0 && d && (d.lap_num || 0) >= scRestartUntilLap) {
      scRestartUntilLap = 0; scOnboardActive = false;
      obEl.classList.remove("show"); return;
    }
  }
  if (!d) { obEl.classList.remove("show"); return; }
  obEl.classList.add("show");
  obEl.style.setProperty("--ob-team", teamColor(d.team));
  setTeamLogo(obEl.querySelector(".ob-logo"), d.team);
  obEl.querySelector(".ob-name").textContent = d.name;
  obEl.querySelector(".ob-pos").textContent = "P" + d.position;
  obEl.querySelector(".ob-speed").textContent = d.speed || 0;
  const g = d.gear;
  obEl.querySelector(".ob-gear").textContent = g === -1 ? "R" : g === 0 ? "N" : g;
  obEl.querySelector(".ob-bar.thr .fill").style.width = ((d.throttle || 0) * 100).toFixed(0) + "%";
  obEl.querySelector(".ob-bar.brk .fill").style.width = ((d.brake || 0) * 100).toFixed(0) + "%";

  // N3: Live-Delta zur persönlichen Bestrunde — NUR in der Quali und NUR wenn der
  // Fokus-Fahrer auf einem Hotlap ist (im Rennen kein Delta).
  const dRow = obEl.querySelector(".ob-delta");
  if (dRow) {
    const onHotlap = session.is_quali && qualiStatus(d) === "track";
    if (!CFG.deltabar || !onHotlap) { dRow.style.display = "none"; }
    else {
      dRow.style.display = "";
      const pb = drvSecBest[d.index];
      const done = Math.min(d.sector || 0, 2);   // m_sector: 0=S1 läuft, 1=S1 fertig, 2=S1+S2 fertig
      let delta = 0, have = false;
      if (pb) {
        const secs = [d.sector1, d.sector2];
        for (let i = 0; i < done; i++)
          if (secs[i] > 0 && pb[i] < Infinity) { delta += secs[i] - pb[i]; have = true; }
      }
      const fill = dRow.querySelector(".fill"), val = dRow.querySelector(".ob-dval");
      if (!have) { fill.style.width = "0"; val.textContent = "—"; val.style.color = "#9aa0aa"; }
      else {
        const pct = Math.min(Math.abs(delta) / 0.75, 1) * 50;   // ±0,75 s = voller Ausschlag
        fill.style.left = (delta <= 0 ? 50 - pct : 50) + "%";
        fill.style.width = pct + "%";
        fill.style.background = delta <= 0 ? "linear-gradient(90deg,#0a8f3c,#27e06a)" : "linear-gradient(90deg,#ff3b30,#a10f0f)";
        val.textContent = (delta <= 0 ? "−" : "+") + Math.abs(delta).toFixed(3);
        val.style.color = delta <= 0 ? "#27e06a" : "#ff5a5a";
      }
    }
  }
}

// Persönliche Bestsektoren auch im Rennen mitführen (Grundlage für den Delta-Balken)
function updateRaceBest(idx, secs) {
  const pb = drvSecBest[idx] || (drvSecBest[idx] = [Infinity, Infinity, Infinity]);
  secs.forEach((v, i) => { if (v > 0 && v < pb[i]) pb[i] = v; });
}

// ── N8: Fastest-Lap-Banner (oben mittig, lila) ───────────────────────────────
const flbEl = document.getElementById("fl-banner");
let flbSig = null, flbTimer = null;
function updateFLBanner(session, connected) {
  if (!CFG.flbanner || !connected || session.is_quali) { flbEl.classList.remove("show"); return; }
  if (!(session.fastest_lap_time > 0)) return;
  const sig = (session.fastest_lap_driver || "") + "|" + session.fastest_lap_time;
  if (sig === flbSig) return;
  const first = flbSig === null;   // beim Laden mitten in der Session nicht sofort feuern
  flbSig = sig;
  if (first) return;
  flbEl.querySelector(".flb-name").textContent = session.fastest_lap_driver || "";
  flbEl.querySelector(".flb-time").textContent = fmtTime(session.fastest_lap_time) || "";
  flbEl.classList.add("show");
  clearTimeout(flbTimer);
  flbTimer = setTimeout(() => flbEl.classList.remove("show"), (CFG.flbdur || 4.5) * 1000);
}

// ── N6: Lower-Third (Broadcast-Namensleiste beim Kamerawechsel) ──────────────
const ltEl = document.getElementById("lower-third");
let ltFocus = null, ltTimer = null;
function updateLowerThird(drivers, focusIdx, session, connected) {
  // Nur im Rennen (in der Quali kein Lower-Third)
  if (!CFG.lowerthird || !connected || session.is_quali) { ltEl.classList.remove("show"); ltFocus = focusIdx; return; }
  if (focusIdx === ltFocus) return;
  ltFocus = focusIdx;
  const d = drivers.find(x => x.index === focusIdx);
  if (!d) return;
  ltEl.style.setProperty("--lt-team", teamColor(d.team));
  ltEl.querySelector(".lt-pos").textContent = "P" + d.position;
  ltEl.querySelector(".lt-name").textContent = d.name;
  setTyreIcon(ltEl.querySelector(".lt-sub img"), d.compound);
  ltEl.querySelector(".lt-sub span").textContent = d.team || "";
  // Interval (Abstand zum Vordermann), nicht Gap zum Führenden
  ltEl.querySelector(".lt-gap").textContent =
    d.position === 1 ? "LEADER"
    : d.laps_down >= 1 ? "+" + d.laps_down + " LAP" + (d.laps_down > 1 ? "S" : "")
    : fmtGap(d.gap_to_ahead);
  ltEl.classList.add("show");
  clearTimeout(ltTimer);
  ltTimer = setTimeout(() => ltEl.classList.remove("show"), (CFG.ltdur || 4) * 1000);
}

// ── N7: Grid-Screen (Startaufstellung, verschwindet sobald die Ampel kommt) ──
const gsEl = document.getElementById("grid-screen");
let gsLightsSeen = false, gsSessType = null, gsSig = "";
function updateGridScreen(data, session, drivers) {
  if (session.type !== gsSessType) { gsSessType = session.type; gsLightsSeen = false; gsSig = ""; }
  const sl = data.start_lights || {};
  if ((sl.num > 0 || sl.out) && sl.age < 120) gsLightsSeen = true;   // Ampel da -> Grid weg
  const isRace = !session.is_quali && (session.total_laps || 0) > 0;
  const preStart = isRace && data.connected && !gsLightsSeen && drivers.length > 1
    && drivers.every(d => (d.lap_num || 0) <= 1)
    && drivers.every(d => (d.lap_distance || 0) <= 0.5);   // vor der Linie (lapDistance negativ)
  if (!CFG.gridscreen || !preStart) { gsEl.classList.remove("show"); return; }
  gsEl.classList.add("show");
  const q = data.quali_results || {};
  const cells = [...drivers].sort((a, b) => (a.grid_position || a.position) - (b.grid_position || b.position));
  const sig = cells.map(d => d.index + ":" + (d.grid_position || d.position)).join(",");
  if (sig === gsSig) return;
  gsSig = sig;
  document.getElementById("gs-sub").textContent = session.total_laps ? session.total_laps + " RUNDEN" : "";
  document.getElementById("gs-cells").innerHTML = cells.map((d, i) => {
    const qt = q[d.name];
    return `<div class="gs-cell ${i % 2 ? "even" : ""}" style="--t:${teamColor(d.team)};animation-delay:${Math.min(i * 40, 900)}ms">`
      + `<span class="gp">${d.grid_position || d.position}</span>`
      + `<span class="gn">${esc(d.name)}<small>${esc(d.team || "")}</small></span>`
      + `<span class="gq">${qt ? fmtTime(qt) : ""}</span></div>`;
  }).join("");
}

// ── N1: Undercut-Alarm ────────────────────────────────────────────────────────
// Fahrer B boxt < 2,5 s hinter A -> "Undercut-Versuch". Sobald A auch geboxt hat
// und wieder draußen ist: Positionen vergleichen -> funktioniert / gescheitert.
const ucPitState = {};
let ucAttempts = [];
function updateUndercut(drivers, session, connected) {
  if (!CFG.undercut || session.is_quali || !connected) { ucAttempts = []; return; }
  const byIdx = {};
  drivers.forEach(d => byIdx[d.index] = d);
  drivers.forEach(d => {
    const was = ucPitState[d.index] || false;
    if (d.in_pit && !was) {   // Boxen-Einfahrt
      const ahead = drivers.find(x => x.position === d.position - 1);
      if (ahead && !ahead.in_pit && d.gap_to_ahead > 0 && d.gap_to_ahead < 2.5) {
        ucAttempts.push({ a: ahead.index, b: d.index, an: ahead.name, bn: d.name, phase: 1, lap0: session.current_lap || 0 });
        raceMsg("⛏", "UNDERCUT-VERSUCH: " + esc(d.name) + " auf " + esc(ahead.name), "#ffcc00");
      }
    }
    ucPitState[d.index] = d.in_pit;
  });
  ucAttempts = ucAttempts.filter(u => {
    const A = byIdx[u.a], B = byIdx[u.b];
    if (!A || !B || A.dnf || B.dnf || A.dsq || B.dsq) return false;
    if ((session.current_lap || 0) - u.lap0 > 6) return false;   // A boxt nicht -> verjährt
    if (u.phase === 1 && A.in_pit) u.phase = 2;                  // Gegner ist in der Box
    if (u.phase === 2 && !A.in_pit) {                            // Gegner wieder draußen -> Ergebnis
      if (B.position < A.position) raceMsg("✓", "UNDERCUT FUNKTIONIERT: " + esc(u.bn) + " vor " + esc(u.an), "#00e676");
      else raceMsg("✗", "UNDERCUT GESCHEITERT: " + esc(u.an) + " bleibt vor " + esc(u.bn), "#ff5a5a");
      return false;
    }
    return true;
  });
}

// ── Trackmap ────────────────────────────────────────────────────────────────
// Kontur kommt von /api/track (live gelernt): Punkte [x, z, Rundenanteil, Sektor].
// Sektorfarben: S1 weiß, S2 blau, S3 rot. Marshal-Zonen (gelb) legen sich als
// blinkende Segmente darüber. Größe/Drehung/Spiegelung kommen live aus den Settings.
const tmEl = document.getElementById("trackmap");
let trackBounds = null, trackVer = -1, trackDone = false;
let trackPtsRaw = [];                       // rohe Konturpunkte
let _tmCos = 1, _tmSin = 0, _tmFlip = true, _tmSig = "";
const SECTOR_COLORS = { 0: "rgba(255,255,255,0.92)", 1: "#2f7bff", 2: "#e10600" };

function ensureTmTransform() {
  const sig = (CFG.maprot || 0) + "|" + (CFG.mapflip ? 1 : 0);
  if (sig === _tmSig) return false;
  _tmSig = sig;
  const r = (CFG.maprot || 0) * Math.PI / 180;
  _tmCos = Math.cos(r); _tmSin = Math.sin(r); _tmFlip = !!CFG.mapflip;
  return true;   // geändert -> Pfade neu bauen
}
// Weltkoordinaten -> 0..100 ViewBox (Seitenverhältnis erhalten, zentriert), dann um
// die Mitte drehen + optional spiegeln. Linie und Punkte laufen beide hier durch.
function normPoint(x, z) {
  if (!trackBounds) return null;
  const { minX, minZ, sc, offX, offZ } = trackBounds;
  let nx = offX + (x - minX) * sc;
  let nz = 100 - (offZ + (z - minZ) * sc);        // z-Achse flippen
  let dx = nx - 50, dz = nz - 50;
  let rx = dx * _tmCos - dz * _tmSin;
  let rz = dx * _tmSin + dz * _tmCos;
  if (_tmFlip) rx = -rx;
  return [rx + 50, rz + 50];
}
const pathFrom = pts => pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");

// Kontur leicht glätten: Zittern aus den ~5m-Lernpunkten mitteln (gewichtetes 3-Punkt-Mittel
// auf der geschlossenen Schleife). Nur x/z; frac (Index 2) und Sektor (Index 3) bleiben pro
// Punkt erhalten -> Sektorgrenzen und Flaggen-Mapping (laufen über frac/Sektor) unverändert.
function smoothLoop(pts, passes = 2) {
  if (!pts || pts.length < 8) return pts;
  let out = pts.map(p => p.slice());
  for (let pass = 0; pass < passes; pass++) {
    const src = out.map(p => p.slice());
    const n = src.length;
    for (let i = 0; i < n; i++) {
      const a = src[(i - 1 + n) % n], c = src[(i + 1) % n];
      out[i][0] = a[0] * 0.25 + src[i][0] * 0.5 + c[0] * 0.25;
      out[i][1] = a[1] * 0.25 + src[i][1] * 0.5 + c[1] * 0.25;
    }
  }
  return out;
}

// Kontur zeichnen: nach Sektoren eingefärbt (wenn Sektor-Info da + mapflags an),
// sonst eine durchgehende weiße Linie.
function buildTrackPaths() {
  if (!trackPtsRaw.length || !trackBounds) return;
  const g = document.getElementById("tm-track");
  const hasMeta = trackPtsRaw[0].length >= 4 && CFG.mapflags;
  // Unterste Schicht: EINE durchgehende dunkle Casing-Linie für die ganze Kontur. Liegt
  // unter allen farbigen Segmenten -> zwischen engen/parallelen Abschnitten bleibt ein
  // klarer dunkler Trennstreifen.
  const casing = `<path class="tm-casing" d="${pathFrom(trackPtsRaw.map(p => normPoint(p[0], p[1])))} Z"></path>`;
  let colors = "";
  if (!hasMeta) {
    colors = `<path class="tm-line" d="${pathFrom(trackPtsRaw.map(p => normPoint(p[0], p[1])))} Z"></path>`;
  } else {
    let run = [trackPtsRaw[0]];
    const flush = (bridge) => {
      const seg = bridge ? run.concat([bridge]) : run;
      if (seg.length > 1) {
        const sec = run[0][3] || 0;
        colors += `<path class="tm-line" style="stroke:${SECTOR_COLORS[sec] || SECTOR_COLORS[0]}" d="${pathFrom(seg.map(p => normPoint(p[0], p[1])))}"></path>`;
      }
    };
    for (let i = 1; i < trackPtsRaw.length; i++) {
      const p = trackPtsRaw[i];
      if ((p[3] || 0) === (run[0][3] || 0)) run.push(p);
      else { flush(p); run = [p]; }
    }
    flush(trackPtsRaw[0]);   // Schleife schließen
  }
  g.innerHTML = casing + colors;
}

// Marshal-Zonen: gelb geflaggte Abschnitte blinken über der Kontur.
let _flagSig = "";
function buildFlagPaths(zones) {
  const g = document.getElementById("tm-flags");
  const usable = CFG.mapflags && zones && zones.length && trackPtsRaw.length
    && trackPtsRaw[0].length >= 3 && trackPtsRaw[0][2] >= 0 && trackBounds;
  if (!usable) { if (g.innerHTML) g.innerHTML = ""; _flagSig = ""; return; }
  const sig = zones.map(z => z.f).join(",") + "|" + _tmSig + "|" + trackVer;
  if (sig === _flagSig) return;
  _flagSig = sig;
  const inZone = (frac, a, b) => a <= b ? (frac >= a && frac < b) : (frac >= a || frac < b);   // mit Wrap
  let html = "";
  zones.forEach((z, i) => {
    if (z.f !== 3) return;   // nur gelbe Flaggen
    const b = i + 1 < zones.length ? zones[i + 1].s : zones[0].s;
    let run = [];
    const flush = () => { if (run.length > 1) html += `<path class="tm-flag" d="${pathFrom(run.map(p => normPoint(p[0], p[1])))}"></path>`; run = []; };
    // Nur Punkte mit gültigem Rundenanteil (0..1). frac === -1 (gelernt bevor track_length
    // bekannt war) darf NICHT flaggen: bei einer über Start/Ziel wrappenden Zone (a > b) wäre
    // sonst `-1 < b` für JEDEN Punkt wahr -> die ganze Kontur würde gelb ("Full Course"-Bug).
    trackPtsRaw.forEach(p => { if (p[2] >= 0 && p[2] <= 1 && inZone(p[2], z.s, b)) run.push(p); else flush(); });
    flush();
  });
  g.innerHTML = html;
}

async function refreshTrack() {
  try {
    const r = await fetch("/api/track");
    const t = await r.json();
    trackDone = !!t.done;
    // Karte wird erst gezeichnet UND gezeigt, wenn die Strecke fertig gelernt ist.
    if (!t.done || !t.pts || t.pts.length < 20) return;
    if (t.ver !== trackVer) {
      trackVer = t.ver;
      trackPtsRaw = smoothLoop(t.pts);   // Kontur glätten (Zittern raus), frac/Sektor bleiben
      let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
      trackPtsRaw.forEach(([x, z]) => { minX = Math.min(minX, x); maxX = Math.max(maxX, x); minZ = Math.min(minZ, z); maxZ = Math.max(maxZ, z); });
      const spanX = maxX - minX || 1, spanZ = maxZ - minZ || 1;
      const pad = 15, size = 100 - 2 * pad;   // Rand -> beim Drehen wird nichts abgeschnitten
      const sc = size / Math.max(spanX, spanZ);          // EIN Faktor -> keine Verzerrung
      trackBounds = { minX, minZ, sc,
                      offX: pad + (size - spanX * sc) / 2,
                      offZ: pad + (size - spanZ * sc) / 2 };
      ensureTmTransform();
      buildTrackPaths();
      _flagSig = "";
    }
  } catch (e) { /* Server weg -> Karte bleibt wie sie ist */ }
}

const carMove = {};   // idx -> {x,z,t}: letzte deutliche Bewegung (für "steht"-Erkennung)
const dnfGhost = {};  // idx -> {t,x,z}: on-track Ausgeschiedener -> Punkt bleibt kurz (verblassend) stehen
const lastKnownPos = {};   // idx -> [x,z]: letzte bekannte Weltposition (überlebt DNF, wenn pos_xz wegfällt)
const DNF_LINGER = 8000;   // ms, wie lange der Ghost-Punkt sichtbar bleibt
let _lastFlagsCfg = null;
// #5: Trackmap in jede Ecke / Kantenmitte setzen (Setting mapcorner: tl/tc/tr/lc/rc/bl/bc/br).
function applyMapCorner(c) {
  const s = tmEl.style, M = "24px";
  s.top = s.bottom = s.left = s.right = "auto"; s.transform = "";
  if (c === "tl")      { s.top = M; s.left = M; }
  else if (c === "tc") { s.top = M; s.left = "50%"; s.transform = "translateX(-50%)"; }
  else if (c === "lc") { s.left = M; s.top = "50%"; s.transform = "translateY(-50%)"; }
  else if (c === "rc") { s.right = M; s.top = "50%"; s.transform = "translateY(-50%)"; }
  else if (c === "bl") { s.bottom = M; s.left = M; }
  else if (c === "bc") { s.bottom = M; s.left = "50%"; s.transform = "translateX(-50%)"; }
  else if (c === "br") { s.bottom = M; s.right = M; }
  else                 { s.top = M; s.right = M; }   // "tr" (Default)
}
function updateTrackmap(drivers, focusIdx, connected, session) {
  // Nur zeigen, wenn verbunden UND die Strecke fertig gebaut ist.
  if (!CFG.map || !connected || !trackBounds || !trackDone) { tmEl.classList.remove("show"); return; }
  tmEl.classList.add("show");
  // Größe + Ausrichtung live aus den Settings
  const px = (CFG.mapsize || 400) + "px";
  if (tmEl.style.width !== px) { tmEl.style.width = px; tmEl.style.height = px; }
  const corner = CFG.mapcorner || "tr";
  if (tmEl.dataset.corner !== corner) { applyMapCorner(corner); tmEl.dataset.corner = corner; }
  if (ensureTmTransform() || _lastFlagsCfg !== CFG.mapflags) { _lastFlagsCfg = CFG.mapflags; buildTrackPaths(); _flagSig = ""; }
  buildFlagPaths(session && session.marshal_zones);
  const g = document.getElementById("tm-cars");
  const seen = new Set();
  const now = performance.now();
  const ds = CFG.dotsize || 1;
  // DNF/DSQ merken: on track (nicht in der Box) aufgegeben -> Position einfrieren, Punkt
  // bleibt danach kurz verblassend stehen. In der Box aufgegeben -> gar kein Track-Punkt.
  drivers.forEach(d => {
    if (d.pos_xz) lastKnownPos[d.index] = d.pos_xz;   // letzte bekannte Weltposition (überlebt DNF)
    const retired = d.dnf || d.dsq;
    const lp = lastKnownPos[d.index];
    if (retired && d.in_pit) delete dnfGhost[d.index];
    else if (retired && lp) { if (!dnfGhost[d.index]) dnfGhost[d.index] = { t: now, x: lp[0], z: lp[1] }; }
    else if (!retired) delete dnfGhost[d.index];
  });
  drivers.forEach(d => {
    if (!d.pos_xz || d.dnf || d.dsq || d.in_pit) return;   // ausgeschieden / Box -> normaler Dot aus
    if (session && session.is_quali && (d.driver_status || 0) === 0) return;   // #1: Garage (fährt nicht) -> nicht auf die Map, bleibt aber im Tower
    // Stehende Autos ausblenden: seit >1,5 s < 3 m bewegt -> steht (geparkt/Crash) -> weg
    const wx = d.pos_xz[0], wz = d.pos_xz[1];
    const rec = carMove[d.index];
    if (!rec) { carMove[d.index] = { x: wx, z: wz, t: now }; }
    else if (Math.hypot(wx - rec.x, wz - rec.z) > 3) { rec.x = wx; rec.z = wz; rec.t = now; }
    else if (now - rec.t > 1500) return;                   // steht -> Dot nicht zeichnen
    const p = normPoint(wx, wz);
    if (!p) return;
    seen.add(String(d.index));
    let grp = g.querySelector(`[data-idx="${d.index}"]`);
    if (!grp) {
      grp = document.createElementNS("http://www.w3.org/2000/svg", "g");
      grp.setAttribute("data-idx", d.index);
      const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      c.setAttribute("class", "tm-dot");
      c.setAttribute("fill", resolveColor(teamColor(d.team)));   // Farbe ändert sich nie -> nur einmal
      const tx = document.createElementNS("http://www.w3.org/2000/svg", "text");
      tx.setAttribute("class", "tm-num");
      grp.appendChild(c); grp.appendChild(tx);
      g.appendChild(grp);
    }
    const c = grp.firstChild, tx = grp.lastChild;
    const r = (d.index === focusIdx ? 3.4 : 2.9) * ds;
    c.setAttribute("cx", p[0].toFixed(1));
    c.setAttribute("cy", p[1].toFixed(1));
    c.setAttribute("r", r.toFixed(2));
    c.classList.toggle("focused", d.index === focusIdx);
    c.classList.remove("retired"); grp.style.opacity = "";   // (falls vorher Ghost) wieder normal
    if (CFG.mapnumbers) {
      tx.style.display = "";
      tx.setAttribute("x", p[0].toFixed(1));
      tx.setAttribute("y", (p[1] + r * 0.42).toFixed(1));
      tx.setAttribute("font-size", (r * 1.15).toFixed(1));
      const pos = String(d.position);
      if (tx.textContent !== pos) tx.textContent = pos;
    } else tx.style.display = "none";
  });
  // Ghost-Punkte: on-track Ausgeschiedene bleiben an ihrer Stelle stehen und verblassen.
  for (const idx in dnfGhost) {
    const gh = dnfGhost[idx];
    const age = now - gh.t;
    const p = age < DNF_LINGER ? normPoint(gh.x, gh.z) : null;
    if (!p) { delete dnfGhost[idx]; continue; }   // abgelaufen/ungültig -> Cleanup entfernt den Dot
    seen.add(String(idx));
    let grp = g.querySelector(`[data-idx="${idx}"]`);
    if (!grp) {
      grp = document.createElementNS("http://www.w3.org/2000/svg", "g");
      grp.setAttribute("data-idx", idx);
      grp.appendChild(document.createElementNS("http://www.w3.org/2000/svg", "circle"));
      const tx = document.createElementNS("http://www.w3.org/2000/svg", "text");
      tx.setAttribute("class", "tm-num"); grp.appendChild(tx);
      g.appendChild(grp);
    }
    const c = grp.firstChild;
    c.setAttribute("class", "tm-dot retired");
    c.setAttribute("cx", p[0].toFixed(1));
    c.setAttribute("cy", p[1].toFixed(1));
    c.setAttribute("r", (2.9 * ds).toFixed(2));
    grp.lastChild.style.display = "none";                         // keine Positionsnummer beim Ausgeschiedenen
    grp.style.opacity = (1 - age / DNF_LINGER).toFixed(2);        // verblassen
  }
  // Verschwundene Autos entfernen
  g.querySelectorAll("g[data-idx]").forEach(el => { if (!seen.has(el.dataset.idx)) el.remove(); });
}
// CSS-Variable (var(--team-x)) -> echter Farbwert für SVG fill
const _colorCache = {};
function resolveColor(v) {
  if (!v || v[0] === "#") return v || "#fff";
  if (_colorCache[v]) return _colorCache[v];
  const name = v.replace(/var\(|\)/g, "").trim();
  const c = getComputedStyle(document.documentElement).getPropertyValue(name).trim() || "#fff";
  _colorCache[v] = c; return c;
}

// ── Verlaufs-Chart: Taste P = Positionen, Taste G = Gaps ─────────────────────
const pcEl = document.getElementById("poschart");
let pcOpen = false, pcMode = "pos";
async function drawPosChart() {
  const svg = document.getElementById("pc-svg");
  const title = pcEl.querySelector(".pc-title");
  if (title) title.textContent = pcMode === "gap" ? "Gap-Verlauf (zum Führenden)" : "Positionsverlauf";
  const rect = svg.getBoundingClientRect();
  const W = rect.width || 1100, H = rect.height || 560;
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);

  // Datenquelle je Modus: Positionen vom Server (Packet 15), Gaps aus der Live-Historie
  let lapsObj, meta;
  if (pcMode === "gap") {
    lapsObj = gapHist;
    meta = {}; lastDrivers.forEach(d => meta[d.index] = { name: d.name, team: d.team });
  } else {
    let data;
    try { data = await (await fetch("/api/lap_positions")).json(); }
    catch (e) { svg.innerHTML = `<text x="20" y="30" class="pc-axis">Keine Daten</text>`; return; }
    lapsObj = data.laps; meta = data.drivers || {};
  }
  const laps = Object.keys(lapsObj).map(Number).sort((a, b) => a - b);
  if (!laps.length) { svg.innerHTML = `<text x="20" y="30" class="pc-axis">Noch keine Rundendaten</text>`; return; }
  const maxLap = laps[laps.length - 1];
  // Y-Skala: Positionen 1..maxPos ODER Gap 0..maxGap
  let maxY = 0;
  laps.forEach(L => Object.values(lapsObj[L]).forEach(v => { if (v > maxY) maxY = v; }));
  if (pcMode === "gap") maxY = Math.max(1, Math.ceil(maxY / 5) * 5);
  const padL = 48, padR = 150, padT = 20, padB = 34;
  const x = L => padL + (maxLap <= 1 ? 0 : (L - 1) / (maxLap - 1)) * (W - padL - padR);
  const y = v => pcMode === "gap"
    ? padT + (v / maxY) * (H - padT - padB)                       // Gap: 0s oben (Führender)
    : padT + (maxY <= 1 ? 0 : (v - 1) / (maxY - 1)) * (H - padT - padB);
  let out = "";
  // Gitter + Y-Achse
  const ySteps = pcMode === "gap" ? 5 : maxY;
  for (let s = 0; s <= ySteps; s++) {
    const v = pcMode === "gap" ? (maxY / ySteps) * s : s + 1;
    if (pcMode !== "gap" && v > maxY) break;
    out += `<line class="pc-grid" x1="${padL}" y1="${y(v).toFixed(1)}" x2="${W-padR}" y2="${y(v).toFixed(1)}"></line>`;
    out += `<text class="pc-axis" x="${padL-8}" y="${(y(v)+4).toFixed(1)}" text-anchor="end">${pcMode === "gap" ? "+" + v.toFixed(0) + "s" : "P" + v}</text>`;
  }
  const lapStep = Math.max(1, Math.round(maxLap / 12));
  for (let L = 1; L <= maxLap; L += lapStep)
    out += `<text class="pc-axis" x="${x(L).toFixed(1)}" y="${H-12}" text-anchor="middle">${L}</text>`;
  // Linien je Fahrer
  const carIdxs = new Set();
  laps.forEach(L => Object.keys(lapsObj[L]).forEach(k => carIdxs.add(k)));
  carIdxs.forEach(idx => {
    const m = meta[idx] || { name: "#" + idx, team: "" };
    const col = resolveColor(teamColor(m.team));
    let pts = [], lastV = null;
    laps.forEach(L => { const v = lapsObj[L][idx]; if (v !== undefined && v !== null) { pts.push([x(L), y(v)]); lastV = v; } });
    if (pts.length < 1) return;
    out += `<path class="pc-track" style="stroke:${col}" d="${pts.map((pt, i) => (i ? "L" : "M") + pt[0].toFixed(1) + " " + pt[1].toFixed(1)).join(" ")}"></path>`;
    if (lastV !== null) {
      const last = pts[pts.length - 1];
      out += `<circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3.5" fill="${col}"></circle>`;
      out += `<text class="pc-endlbl" style="fill:${col}" x="${(last[0]+8).toFixed(1)}" y="${(last[1]+4).toFixed(1)}">${esc(m.name)}</text>`;
    }
  });
  svg.innerHTML = out;
}
function openChart(mode) {
  if (pcOpen && pcMode === mode) { pcOpen = false; pcEl.classList.remove("show"); return; }
  pcMode = mode; pcOpen = true;
  pcEl.classList.add("show");
  drawPosChart();
}
document.addEventListener("keydown", e => {
  if (e.key === "p" || e.key === "P") openChart("pos");
  if (e.key === "g" || e.key === "G") openChart("gap");
  if (e.key === "Escape" && pcOpen) { pcOpen = false; pcEl.classList.remove("show"); }
  // Taste T: Trackmap neu lernen (falls eine verzerrte Runde erwischt wurde)
  if (e.key === "t" || e.key === "T") {
    fetch("/api/track/relearn", { method: "POST" }).catch(() => {});
    trackDone = false; trackVer = -1; tmEl.classList.remove("show");
  }
});

// ── Datenanbindung: SSE (Push) mit Polling-Fallback ─────────────────────────
let usingSSE = false, pollTimer = null;
function startPolling() {
  if (pollTimer) return;
  fetchAndRender();
  pollTimer = setInterval(fetchAndRender, 200);
}
function startSSE() {
  try {
    const es = new EventSource("/api/stream");
    es.onmessage = ev => { try { render(JSON.parse(ev.data)); usingSSE = true; } catch (e) {} };
    es.onerror = () => {
      // Verbindung weg -> auf Polling zurückfallen (EventSource versucht selbst reconnect,
      // aber wir wollen sicher Daten sehen)
      if (!usingSSE) { es.close(); startPolling(); }
    };
  } catch (e) { startPolling(); }
}
startSSE();
setTimeout(() => { if (!usingSSE) startPolling(); }, 1500);   // SSE kam nicht -> Polling
refreshTrack();
setInterval(refreshTrack, 2000);        // Trackmap-Kontur aktuell halten (bis gelernt)
setInterval(() => { if (pcOpen) drawPosChart(); }, 3000);   // Chart offen -> nachziehen
</script>
</body>
</html>
